<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI助手</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body { font-family: "Inter", sans-serif; }
    .font-headline { font-family: "Manrope", sans-serif; }
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 24; }
    .status-bar-safe { padding-top: env(safe-area-inset-top); }
    .bottom-safe { padding-bottom: env(safe-area-inset-bottom); }
    .tag-chip { transition: all 0.2s ease; }
    .tag-chip.active { background: #17181b; color: #ffffff; border-color: #17181b; box-shadow: 0 12px 30px rgba(23,24,27,0.16); }
    .tag-chip.active .chip-icon { filter: saturate(1.1); }
    .suggest-card { transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease; }
    .suggest-card:hover { transform: translateY(-2px); border-color: #d1d5db; box-shadow: 0 12px 28px rgba(15,23,42,0.08); }
    .suggest-card.selected { border-color: #17181b; background: #f8fafc; box-shadow: 0 12px 28px rgba(15,23,42,0.1); }
    .composer-overlay { transition: opacity 0.25s ease; }
    .composer-sheet { transition: transform 0.28s ease, opacity 0.28s ease; }
    .keyboard-key {
      height: 44px;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 1px 0 rgba(15, 23, 42, 0.08), 0 2px 8px rgba(15, 23, 42, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: #111827;
    }
    .keyboard-key.wide { background: #d1d5db; color: #111827; }
    .keyboard-key.space { flex: 1; }
  </style>
</head>
<body class="bg-[#f5f6f7] text-[#2c2f30] min-h-screen">
  <main class="status-bar-safe min-h-screen flex flex-col">
    <header class="fixed top-0 left-0 right-0 status-bar-safe bg-[#f5f6f7]/95 backdrop-blur z-40">
      <div class="h-12 px-4 flex items-center justify-between">
        <button id="openHistoryBtn" type="button" class="w-9 h-9 flex items-center justify-center text-[#17181b]">
          <span class="material-symbols-outlined text-[28px] leading-none">menu</span>
        </button>
        <h2 class="font-headline text-[18px] font-extrabold text-[#17181b] tracking-tight">知道AI</h2>
        <button id="newChatBtn" type="button" class="w-9 h-9 flex items-center justify-center text-[#17181b]">
          <span class="material-symbols-outlined text-[28px] leading-none">add_comment</span>
        </button>
      </div>
    </header>

    <aside id="historyPanel" class="fixed inset-y-0 left-0 w-[83%] max-w-[380px] bg-[#f3f3f3] z-50 transform -translate-x-full transition-transform duration-300 ease-out">
      <div class="h-full flex flex-col">
        <div class="px-6 pt-6 pb-4 flex items-center justify-between">
          <h3 class="font-headline text-[22px] font-extrabold tracking-tight text-[#17181b]">对话历史</h3>
          <button id="closeHistoryBtn" type="button" class="w-10 h-10 flex items-center justify-center text-gray-500">
            <span class="material-symbols-outlined text-[34px]">close</span>
          </button>
        </div>
        <div class="px-6 text-[22px] text-gray-500">常用提问</div>
        <div id="historyList" class="px-4 pt-5 pb-10 space-y-4 overflow-y-auto"></div>
      </div>
    </aside>
    <div id="historyBackdrop" class="fixed inset-0 bg-black/30 z-40 opacity-0 pointer-events-none transition-opacity duration-300"></div>

    <section class="flex-1 flex flex-col items-center px-4 pt-16 pb-36">
      <div class="w-14 h-14 rounded-full bg-gradient-to-br from-sky-200 via-indigo-200 to-purple-200 p-[3px] shadow-[0_0_24px_rgba(255,255,255,0.18)]">
        <div class="w-full h-full rounded-full bg-[#0f172a] flex items-center justify-center text-2xl">🤖</div>
      </div>

      <h1 class="mt-4 text-[22px] md:text-3xl font-headline font-extrabold tracking-tight text-[#1f2329] text-center">你的 Web3 研究助手</h1>
      <p id="categoryDescription" class="mt-2 text-sm md:text-base text-[#4b5563] font-medium text-center max-w-3xl">覆盖行情、链上、DeFi、空投、安全、宏观与项目研究，帮你更快提出专业问题。</p>

      <div id="tagWrap" class="mt-4 flex flex-wrap items-center justify-center gap-2"></div>

      <div class="mt-4 w-full max-w-5xl rounded-[24px] bg-white/90 border border-white shadow-[0_16px_50px_rgba(15,23,42,0.07)] p-4 md:p-5">
        <div class="flex items-start justify-between gap-4">
          <div>
            <p class="text-[12px] font-bold uppercase tracking-[0.18em] text-gray-400">当前方向</p>
            <h3 id="categoryTitle" class="mt-1 text-xl font-headline font-extrabold text-[#17181b]">市场行情</h3>
            <p id="categoryMeta" class="mt-1 text-[13px] text-gray-500">优先适合趋势判断、节奏拆解和短线计划。</p>
          </div>
          <button id="randomPromptBtn" type="button" class="shrink-0 inline-flex items-center gap-1.5 rounded-full border border-gray-200 bg-[#f8fafc] px-3 py-1.5 text-xs font-semibold text-[#17181b]">
            <span class="material-symbols-outlined text-[16px]">shuffle</span>
            换一批
          </button>
        </div>

        <div id="suggestionWrap" class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-2.5"></div>

      </div>
    </section>

    <footer id="collapsedComposer" class="bottom-safe fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-gray-100 z-50">
      <div class="w-full max-w-md mx-auto px-4 pb-4 pt-3">
        <div class="grid grid-cols-4 gap-2 mb-3">
          <a href="ai-chat.html" class="flex flex-col items-center gap-1 text-[11px] font-bold text-gray-900">
            <span class="material-symbols-outlined text-[21px]">smart_toy</span>
            <span>agent</span>
            <span class="h-0.5 w-7 rounded-full bg-gray-900"></span>
          </a>
          <a href="discover.html" class="flex flex-col items-center gap-1 text-[11px] font-semibold text-gray-400">
            <span class="material-symbols-outlined text-[21px]">explore</span>

          <a href="ai-watch.html" class="flex flex-col items-center gap-1 text-[11px] font-semibold text-gray-400">

            <span>账户</span>
          </a>
        </div>
        <div class="flex items-center justify-between gap-3">

            快讯
          </a>
          <button id="openComposerBtn" type="button" class="flex-grow h-12 bg-white rounded-full border border-gray-300 px-4 flex items-center shadow-sm text-left">
            <span class="flex-grow text-sm text-gray-400">提问或搜索</span>
          </button>
          <a href="market.html" class="w-12 h-12 flex-shrink-0 border border-gray-300 rounded-full flex items-center justify-center bg-white text-[10px] font-black text-gray-500 shadow-sm">
            行情

        </div>
        <p class="text-[9px] text-gray-400 mt-2 text-center">内容由AI生成，不构成投资建议</p>

    </footer>

    <div id="composerOverlay" class="composer-overlay fixed inset-0 bg-black/10 z-50 opacity-0 pointer-events-none"></div>
    <div id="composerSheet" class="composer-sheet fixed inset-x-0 bottom-0 z-[60] translate-y-full opacity-0 pointer-events-none">
      <div class="w-full max-w-md mx-auto bg-white rounded-t-[32px] shadow-[0_-20px_60px_rgba(15,23,42,0.12)] overflow-hidden">
        <div class="px-4 pt-4 pb-3">
          <div class="flex justify-end mb-3">
            <button id="closeComposerBtn" type="button" class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center text-gray-500">
              <span class="material-symbols-outlined text-[20px]">keyboard_arrow_down</span>
            </button>
          </div>

          <div class="rounded-[28px] bg-white px-4 pt-4 pb-3">
            <textarea id="chatInput" class="w-full resize-none border-none bg-transparent p-0 text-[16px] leading-6 text-gray-700 placeholder:text-gray-400 focus:ring-0 shadow-none outline-none" rows="2" placeholder="提问或搜索"></textarea>
            <div class="mt-4 flex justify-end">
              <button id="submitBtn" type="button" class="rounded-full bg-[#f8b4bc] px-5 py-2 text-[15px] font-bold text-white disabled:opacity-50" disabled>发送</button>
            </div>
          </div>
        </div>

        <div class="bg-[#d1d5db] px-2 pt-3 pb-4">
          <div class="mb-3 flex items-center justify-between px-2 text-[18px]">
            <div class="flex items-center gap-8">
              <span>123</span>
              <span>ABC</span>
              <span class="text-[#ef4444]">中文</span>
            </div>
            <span class="material-symbols-outlined text-[22px]">expand_more</span>
          </div>

          <div class="space-y-2">
            <div class="grid grid-cols-10 gap-1.5">
              <span class="keyboard-key">Q</span><span class="keyboard-key">W</span><span class="keyboard-key">E</span><span class="keyboard-key">R</span><span class="keyboard-key">T</span><span class="keyboard-key">Y</span><span class="keyboard-key">U</span><span class="keyboard-key">I</span><span class="keyboard-key">O</span><span class="keyboard-key">P</span>
            </div>
            <div class="grid grid-cols-9 gap-1.5 px-4">
              <span class="keyboard-key">A</span><span class="keyboard-key">S</span><span class="keyboard-key">D</span><span class="keyboard-key">F</span><span class="keyboard-key">G</span><span class="keyboard-key">H</span><span class="keyboard-key">J</span><span class="keyboard-key">K</span><span class="keyboard-key">L</span>
            </div>
            <div class="grid grid-cols-[52px_repeat(7,1fr)_52px] gap-1.5">
              <span class="keyboard-key wide">⇧</span><span class="keyboard-key">Z</span><span class="keyboard-key">X</span><span class="keyboard-key">C</span><span class="keyboard-key">V</span><span class="keyboard-key">B</span><span class="keyboard-key">N</span><span class="keyboard-key">M</span><span class="keyboard-key wide">⌫</span>

            <div class="grid grid-cols-[72px_1fr_92px] gap-1.5">
              <span class="keyboard-key wide">123</span>
              <span class="keyboard-key space">space</span>
              <span class="keyboard-key wide opacity-60">send</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>

    const categoryDescription = document.getElementById("categoryDescription");
    const categoryTitle = document.getElementById("categoryTitle");
    const categoryMeta = document.getElementById("categoryMeta");
    const chatInput = document.getElementById("chatInput");
    const submitBtn = document.getElementById("submitBtn");
    const randomPromptBtn = document.getElementById("randomPromptBtn");
    const openHistoryBtn = document.getElementById("openHistoryBtn");
    const closeHistoryBtn = document.getElementById("closeHistoryBtn");
    const historyPanel = document.getElementById("historyPanel");
    const historyBackdrop = document.getElementById("historyBackdrop");
    const newChatBtn = document.getElementById("newChatBtn");
    const openComposerBtn = document.getElementById("openComposerBtn");

      {

        prompts: [

          "如果一个项目热度很高，我怎样避免只被故事打动而忽略基本面",
          "请以投资人的视角，拆解 RWA 赛道未来 12 个月的主要机会和风险"
        ]
      },
      {
        id: "learning",
        label: "新手学习",
        icon: "🧠",
        iconClass: "text-teal-500",
        description: "适合问概念入门、术语解释、操作步骤和学习路径。",
        prompts: [
          "我是新手，请用最通俗的话解释比特币、以太坊和稳定币分别是什么",
          "从零开始进入 Web3，我应该先学钱包、交易所、链上还是项目研究",
          "什么是 Gas、滑点、MEV、清算？请分别举一个场景说明",
          "帮我做一份 30 天 Web3 学习路线图，每周都有重点",
          "如果我只想先建立安全认知，应该优先掌握哪些基础知识"
        ]
      }
    ];

    const historyPrompts = [
      "结合 ETF 资金流和链上数据，判断 BTC 这周更像震荡还是趋势延续",
      "给我一份适合新手的 Web3 钱包安全排查清单",
      "当前有哪些值得跟踪的空投项目？请按投入产出比排序",
      "Aave、Morpho、Pendle 这几个协议分别适合什么类型用户",
      "如果我想研究一个新项目，应该按什么顺序做基本面分析",
      "请解释最近稳定币监管变化对加密市场意味着什么"
    ];

    let activeCategoryId = categoryData[0].id;
    const suggestionState = new Map();

    function shuffleArray(list) {
      const copy = [...list];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function getSuggestionBatch(category) {
      const prompts = category.prompts || [];
      const batchSize = Math.min(4, prompts.length);
      const currentIndex = suggestionState.get(category.id) || 0;
      const rotated = prompts.slice(currentIndex).concat(prompts.slice(0, currentIndex));
      return rotated.slice(0, batchSize);
    }

    function syncSubmitState() {
      if (!submitBtn || !chatInput) return;
      submitBtn.disabled = !(chatInput.value || "").trim();
    }

    function openPrompt(text) {
      localStorage.setItem("zhidao_ai_last_prompt", text);
      window.location.href = "ai-chat-examples.html";
    }

    function createPromptButton(text, className, options = {}) {
      const { closeAfterClick = false } = options;
      const button = document.createElement("button");
      button.type = "button";
      button.className = className;
      button.innerHTML = `
        <span class="block text-left text-[15px] font-semibold text-[#17181b] leading-6">${text}</span>
      `;
      button.addEventListener("click", () => {
        if (button.classList.contains("suggest-card")) {
          Array.from(document.querySelectorAll(".suggest-card")).forEach((card) => card.classList.remove("selected"));
          button.classList.add("selected");
        }
        if (closeAfterClick) {
          closeHistory();
        }
        openPrompt(text);
      });
      return button;
    }

    function renderHistory() {
      if (!historyList) return;
      historyList.innerHTML = "";
      historyPrompts.forEach((text, index) => {
        const className = index === 0
          ? "history-item w-full text-left rounded-3xl bg-[#e9eaee] px-5 py-4 text-[20px] text-[#222428]"
          : "history-item w-full text-left rounded-3xl px-5 py-4 text-[20px] text-[#222428]";
        historyList.appendChild(createPromptButton(text, className, { closeAfterClick: true }));
      });
    }

    function renderSuggestions(categoryId) {
      const category = categoryData.find((item) => item.id === categoryId) || categoryData[0];
      if (categoryDescription) {
        categoryDescription.textContent = category.description;
      }
      if (categoryTitle) {
        categoryTitle.textContent = category.label;
      }
      if (categoryMeta) {
        categoryMeta.textContent = category.prompts[0];
      }
      if (!suggestionWrap) return;
      suggestionWrap.innerHTML = "";
      const batch = getSuggestionBatch(category);
      batch.forEach((text) => {
        suggestionWrap.appendChild(
          createPromptButton(text, "suggest-card rounded-[20px] border border-gray-200 bg-white px-3.5 py-3 text-sm text-[#3c4148] text-left")
        );
      });
    }

    function renderTags() {
      if (!tagWrap) return;
      tagWrap.innerHTML = "";
      categoryData.forEach((item, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.dataset.category = item.id;
        button.className = "tag-chip inline-flex items-center gap-1.5 rounded-full bg-white px-3 py-1.5 text-xs md:text-sm font-semibold text-[#323843] border border-gray-200";
        if (index === 0) {
          button.classList.add("active");
        }
        button.addEventListener("click", () => {
          activeCategoryId = item.id;
          Array.from(tagWrap.querySelectorAll(".tag-chip")).forEach((x) => x.classList.remove("active"));
          button.classList.add("active");
          renderSuggestions(activeCategoryId);
        });
        button.innerHTML = `<span class="chip-icon ${item.iconClass}">${item.icon}</span>${item.label}`;
        tagWrap.appendChild(button);
      });
    }

    function openHistory() {
      historyPanel.classList.remove("-translate-x-full");
      historyBackdrop.classList.remove("opacity-0", "pointer-events-none");
      document.body.classList.add("overflow-hidden");
    }

    function closeHistory() {
      historyPanel.classList.add("-translate-x-full");
      historyBackdrop.classList.add("opacity-0", "pointer-events-none");
      document.body.classList.remove("overflow-hidden");
    }

    function openComposer() {
      if (composerOverlay) {
        composerOverlay.classList.remove("opacity-0", "pointer-events-none");
      }
      if (composerSheet) {
        composerSheet.classList.remove("translate-y-full", "opacity-0", "pointer-events-none");
      }
      if (collapsedComposer) {
        collapsedComposer.classList.add("opacity-0");
      }
      document.body.classList.add("overflow-hidden");
      window.setTimeout(() => {
        if (chatInput) chatInput.focus();
      }, 120);
    }

    function closeComposer() {
      if (composerOverlay) {
        composerOverlay.classList.add("opacity-0", "pointer-events-none");
      }
      if (composerSheet) {
        composerSheet.classList.add("translate-y-full", "opacity-0", "pointer-events-none");
      }
      if (collapsedComposer) {
        collapsedComposer.classList.remove("opacity-0");
      }
      document.body.classList.remove("overflow-hidden");
    }

    renderTags();
    renderSuggestions(activeCategoryId);
    renderHistory();

    if (openHistoryBtn) {
      openHistoryBtn.addEventListener("click", openHistory);
    }

    if (closeHistoryBtn) {
      closeHistoryBtn.addEventListener("click", closeHistory);
    }

    if (historyBackdrop) {
      historyBackdrop.addEventListener("click", closeHistory);
    }

    if (newChatBtn) {
      newChatBtn.addEventListener("click", () => {
        localStorage.removeItem("zhidao_ai_last_prompt");
        if (chatInput) {
          chatInput.value = "";
          openComposer();
        }
        closeHistory();
        if (!window.location.pathname.endsWith("ai-chat.html")) {
          window.location.href = "ai-chat.html";
        }
        Array.from(document.querySelectorAll(".suggest-card")).forEach((card) => card.classList.remove("selected"));
        syncSubmitState();
      });
    }

    if (randomPromptBtn) {
      randomPromptBtn.addEventListener("click", () => {
        const category = categoryData.find((item) => item.id === activeCategoryId) || categoryData[0];
        const prompts = shuffleArray(category.prompts || []);
        if (!prompts.length) return;
        const nextIndex = ((suggestionState.get(category.id) || 0) + 4) % prompts.length;
        category.prompts = prompts;
        suggestionState.set(category.id, nextIndex);
        renderSuggestions(activeCategoryId);
      });
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeHistory();
        closeComposer();
      }
    });

    function normalizeShortcutText(inputText) {
      return (inputText || "").trim().toLowerCase().replace(/\s+/g, "");
    }

    function getShortcutRoute(inputText) {
      const normalized = normalizeShortcutText(inputText);
      const assetMap = {
        btc: { symbol: "BTC/USDT", price: "68,420.20", change: "+2.84%" },
        eth: { symbol: "ETH/USDT", price: "3,480.66", change: "+1.42%" },
        sol: { symbol: "SOL/USDT", price: "152.84", change: "-0.88%" },
        比特币: { symbol: "BTC/USDT", price: "68,420.20", change: "+2.84%" },
        以太坊: { symbol: "ETH/USDT", price: "3,480.66", change: "+1.42%" },
      };
      const directMap = {
        "你能干什么": "ai-chat.html",
        "能做什么": "ai-chat.html",
        "帮助": "ai-chat.html",
        "全部触发": "ai-watch-trigger-detail.html",
        "查看全部触发": "ai-watch-trigger-detail.html",
        "全部触发页": "ai-watch-trigger-detail.html",
        "管理自选": "ai-watch-detail.html",
        "删除自选": "ai-watch-detail.html",
        "自选管理": "ai-watch-detail.html",
        "去盯盘": "ai-watch.html",
        "打开盯盘": "ai-watch.html",
        "看快讯": "news.html",
        "最新快讯": "news.html",
        "新闻": "news.html",
        "看行情": "trade.html",
        "行情页": "trade.html",
        "去交易所": "trade.html",
        "看账户": "wallet.html",
        "我的账户": "wallet.html",
        "钱包": "wallet.html",
        "管理账户": "account-manage.html",
        "账户管理": "account-manage.html",
        "管理钱包": "wallet-manage.html",
        "钱包管理": "wallet-manage.html",
        "去授权": "wallet-authorize.html",
        "管理授权": "wallet-authorize.html",
        "交易所授权": "wallet-authorize.html",
        "新增授权": "wallet-authorize-bind.html",
        "绑定api": "wallet-authorize-bind.html",
        "绑定交易所": "wallet-authorize-bind.html",
        "发现": "discover.html",
        "发现页": "discover.html",
        "看市场概览": "discover.html",
      };
      if (directMap[normalized]) {
        return directMap[normalized];
      }

      for (const [assetKey, assetValue] of Object.entries(assetMap)) {
        if (normalized === `${assetKey}盯盘` || normalized === `帮我看${assetKey}盯盘` || normalized === `我要${assetKey}盯盘`) {
          return `ai-watch-config.html?symbol=${encodeURIComponent(assetValue.symbol)}&price=${encodeURIComponent(assetValue.price)}&change=${encodeURIComponent(assetValue.change)}`;
        }
        if (normalized === `${assetKey}触发` || normalized === `帮我看${assetKey}触发` || normalized === `${assetKey}今日触发`) {
          return `ai-watch-trigger-signal-detail.html?symbol=${encodeURIComponent(assetValue.symbol)}&type=macro`;
        }
      }

      return null;
    }

    function submit() {
      const text = (chatInput.value || "").trim();
      if (!text) return;
      const shortcutRoute = getShortcutRoute(text);
      if (shortcutRoute) {
        window.location.href = shortcutRoute;
        return;
      }
      localStorage.setItem("zhidao_ai_last_prompt", text);
      window.location.href = "ai-chat-examples.html";
    }

    if (submitBtn) {
      submitBtn.addEventListener("click", submit);
    }

    if (openComposerBtn) {
      openComposerBtn.addEventListener("click", openComposer);
    }

    if (closeComposerBtn) {
      closeComposerBtn.addEventListener("click", closeComposer);
    }

    if (composerOverlay) {
      composerOverlay.addEventListener("click", closeComposer);
    }

    if (chatInput) {
      chatInput.addEventListener("input", syncSubmitState);
      chatInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          submit();
        }
      });
    }

    syncSubmitState();
  </script>
</body>
</html>
