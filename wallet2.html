<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallet 2</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body { font-family: "Inter", sans-serif; }
    .wallet-card-glow {
      box-shadow: 0 14px 28px rgba(31, 75, 255, 0.18);
    }
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 24;
    }
  </style>
</head>
<body class="bg-white min-h-screen text-[#1b1f24]">
  <main class="max-w-md mx-auto px-4 pt-6 pb-10">
    <div class="flex items-center justify-between text-[15px] font-semibold">
      <div class="flex items-center gap-3">
        <button type="button" onclick="history.back()" class="w-9 h-9 inline-flex items-center justify-center text-gray-700">
          <span class="text-[28px] leading-none">‹</span>
        </button>
        <span>9:41</span>
      </div>
      <div class="flex items-center gap-2 text-[16px]">
        <span>▮▮▮</span>
        <span>◜◝</span>
        <span class="inline-block w-8 h-4 rounded border-2 border-gray-800 relative">
          <span class="absolute right-0.5 top-0.5 bottom-0.5 w-3 bg-gray-800 rounded-sm"></span>
        </span>
      </div>
    </div>

    <section class="mt-8 rounded-[24px] bg-gradient-to-r from-[#1B4DFF] to-[#2947D8] wallet-card-glow px-6 py-7 text-white overflow-hidden relative">
      <div class="relative z-10">
        <p class="text-[14px] text-white/80">当前选择</p>
        <div class="mt-2 flex items-center gap-1.5">
          <p class="text-[22px] font-semibold tracking-wide">钱包 1</p>
          <span class="text-[24px] leading-none">⌄</span>
        </div>
      </div>
      <div class="absolute right-5 top-1/2 -translate-y-1/2">
        <div class="w-[96px] h-[96px] rounded-[22px] bg-white/8 border border-white/10"></div>
        <div class="absolute left-5 top-5 w-[76px] h-[76px] rounded-[18px] bg-white/8 border border-white/10"></div>
        <div class="absolute left-9 top-9 w-8 h-8 rounded-full bg-white/10"></div>
        <div class="absolute right-2 top-2 w-[54px] h-[54px] rounded-[16px] bg-white/14 backdrop-blur flex items-center justify-center">
          <span class="material-symbols-outlined text-[28px]">wallet</span>
        </div>
      </div>
    </section>

    <section class="mt-8 rounded-[22px] border border-[#E6E6E6] overflow-hidden bg-white">
      <a href="account-manage.html" class="flex items-center justify-between px-5 py-5">
        <div class="flex items-center gap-4">
          <span class="material-symbols-outlined text-[26px] text-[#444]">shield</span>
          <span class="text-[18px] font-semibold text-[#222]">账号管理</span>
        </div>
        <span class="material-symbols-outlined text-[28px] text-[#9CA3AF]">chevron_right</span>
      </a>
      <div class="h-px bg-[#EAEAEA]"></div>
      <a href="wallet-manage.html" class="flex items-center justify-between px-5 py-5">
        <div class="flex items-center gap-4">
          <span class="material-symbols-outlined text-[26px] text-[#444]">key</span>
          <span class="text-[18px] font-semibold text-[#222]">钱包地址</span>
        </div>
        <span class="material-symbols-outlined text-[28px] text-[#9CA3AF]">chevron_right</span>
      </a>
      <div class="h-px bg-[#EAEAEA]"></div>
      <a href="wallet-authorize.html" class="flex items-center justify-between px-5 py-5">
        <div class="flex items-center gap-4">
          <span class="material-symbols-outlined text-[26px] text-[#444]">lock</span>
          <span class="text-[18px] font-semibold text-[#222]">账户授权</span>
        </div>
        <span class="material-symbols-outlined text-[28px] text-[#9CA3AF]">chevron_right</span>
      </a>
    </section>
  </main>
</body>
</html>
