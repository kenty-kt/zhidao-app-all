<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理自选 - ZhiDao AI</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body { font-family: "Inter", sans-serif; }
    .font-headline { font-family: "Manrope", sans-serif; }
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 24; }
    .status-bar-safe { padding-top: env(safe-area-inset-top); }
    .watch-check:checked + .watch-card {
      border-color: #f2b94b;
      background: #fffaf0;
      color: #111827;
      box-shadow: 0 0 0 1px rgba(242, 185, 75, 0.18) inset;
    }
    .watch-check:checked + .watch-card .watch-dot {
      border-color: #f59e0b;
      background: #f59e0b;
      box-shadow: inset 0 0 0 3px #fff;
    }
  </style>
</head>
<body class="bg-[#f3f3f4] text-[#2c2f30] min-h-screen pb-32">
  <header class="status-bar-safe sticky top-0 z-50 bg-white/90 backdrop-blur border-b border-gray-100">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <button type="button" onclick="history.back()" class="w-9 h-9 inline-flex items-center justify-center rounded-full bg-gray-100 text-gray-700">
        <span class="material-symbols-outlined text-[20px]">arrow_back</span>
      </button>
      <div class="text-center">
        <p class="font-headline font-extrabold tracking-tight">管理自选</p>
      </div>
      <div class="w-9 h-9"></div>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-4 pb-24">
    <div class="space-y-6">
      <section class="bg-white rounded-3xl border border-gray-100 shadow-sm px-5 py-5 space-y-4">
        <div class="flex items-center justify-between gap-3">
          <div class="flex items-center gap-2">
            <span class="w-1.5 h-6 rounded-full bg-[#FF4D5A]"></span>
            <h2 class="font-headline text-[18px] font-extrabold text-gray-900">我的自选列表</h2>
          </div>
          <label class="inline-flex items-center gap-2 text-sm font-bold text-gray-700 cursor-pointer">
            <input type="checkbox" id="selectAllFavorites" class="accent-amber-500" />
            <span>全选</span>
          </label>
        </div>

        <div class="space-y-3">
          <label class="cursor-pointer block">
            <input type="checkbox" class="watch-check hidden" />
            <span class="watch-card flex items-center justify-between gap-3 rounded-2xl border border-transparent bg-[#F6F5FF] px-4 py-4">
              <span class="flex items-center gap-3 min-w-0">
                <span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white shrink-0"></span>
                <span class="min-w-0">
                  <span class="block text-[16px] font-bold text-gray-900">BTC/USDT</span>
                  <span class="block text-xs text-gray-400 mt-1">永续 · $3.28亿</span>
                </span>
              </span>
              <span class="text-right shrink-0">
                <span class="block text-[16px] font-bold text-gray-900">68,420.20</span>
                <span class="block text-xs font-bold text-rose-500 mt-1">+2.84%</span>
              </span>
            </span>
          </label>

          <label class="cursor-pointer block">
            <input type="checkbox" class="watch-check hidden" />
            <span class="watch-card flex items-center justify-between gap-3 rounded-2xl border border-transparent bg-[#F6F5FF] px-4 py-4">
              <span class="flex items-center gap-3 min-w-0">
                <span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white shrink-0"></span>
                <span class="min-w-0">
                  <span class="block text-[16px] font-bold text-gray-900">ETH/USDT</span>
                  <span class="block text-xs text-gray-400 mt-1">永续 · $1.94亿</span>
                </span>
              </span>
              <span class="text-right shrink-0">
                <span class="block text-[16px] font-bold text-gray-900">3,480.66</span>
                <span class="block text-xs font-bold text-rose-500 mt-1">+1.42%</span>
              </span>
            </span>
          </label>

          <label class="cursor-pointer block">
            <input type="checkbox" class="watch-check hidden" />
            <span class="watch-card flex items-center justify-between gap-3 rounded-2xl border border-transparent bg-[#F6F5FF] px-4 py-4">
              <span class="flex items-center gap-3 min-w-0">
                <span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white shrink-0"></span>
                <span class="min-w-0">
                  <span class="block text-[16px] font-bold text-gray-900">SOL/USDT</span>
                  <span class="block text-xs text-gray-400 mt-1">永续 · $8,420万</span>
                </span>
              </span>
              <span class="text-right shrink-0">
                <span class="block text-[16px] font-bold text-gray-900">152.84</span>
                <span class="block text-xs font-bold text-emerald-600 mt-1">-0.88%</span>
              </span>
            </span>
          </label>

          <label class="cursor-pointer block">
            <input type="checkbox" class="watch-check hidden" />
            <span class="watch-card flex items-center justify-between gap-3 rounded-2xl border border-transparent bg-[#F6F5FF] px-4 py-4">
              <span class="flex items-center gap-3 min-w-0">
                <span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white shrink-0"></span>
                <span class="min-w-0">
                  <span class="block text-[16px] font-bold text-gray-900">BTC 永续</span>
                  <span class="block text-xs text-gray-400 mt-1">永续 · $5.62亿</span>
                </span>
              </span>
              <span class="text-right shrink-0">
                <span class="block text-[16px] font-bold text-gray-900">68,452.10</span>
                <span class="block text-xs font-bold text-rose-500 mt-1">+3.06%</span>
              </span>
            </span>
          </label>

          <label class="cursor-pointer block">
            <input type="checkbox" class="watch-check hidden" />
            <span class="watch-card flex items-center justify-between gap-3 rounded-2xl border border-transparent bg-[#F6F5FF] px-4 py-4">
              <span class="flex items-center gap-3 min-w-0">
                <span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white shrink-0"></span>
                <span class="min-w-0">
                  <span class="block text-[16px] font-bold text-gray-900">ETH 永续</span>
                  <span class="block text-xs text-gray-400 mt-1">永续 · $2.41亿</span>
                </span>
              </span>
              <span class="text-right shrink-0">
                <span class="block text-[16px] font-bold text-gray-900">3,486.00</span>
                <span class="block text-xs font-bold text-rose-500 mt-1">+1.66%</span>
              </span>
            </span>
          </label>

          <label class="cursor-pointer block">
            <input type="checkbox" class="watch-check hidden" />
            <span class="watch-card flex items-center justify-between gap-3 rounded-2xl border border-transparent bg-[#F6F5FF] px-4 py-4">
              <span class="flex items-center gap-3 min-w-0">
                <span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white shrink-0"></span>
                <span class="min-w-0">
                  <span class="block text-[16px] font-bold text-gray-900">1000PEPE 永续</span>
                  <span class="block text-xs text-gray-400 mt-1">永续 · $7,860万</span>
                </span>
              </span>
              <span class="text-right shrink-0">
                <span class="block text-[16px] font-bold text-gray-900">0.01284</span>
                <span class="block text-xs font-bold text-rose-500 mt-1">+5.82%</span>
              </span>
            </span>
          </label>
        </div>
      </section>
    </div>
  </main>

  <div class="fixed bottom-0 left-0 right-0 bg-white/96 backdrop-blur border-t border-gray-100 z-40">
    <div class="max-w-3xl mx-auto px-4 py-4 grid grid-cols-2 gap-4">
      <a href="ai-watch.html" class="inline-flex items-center justify-center h-14 rounded-full border border-[#F2B9C0] text-[#E24B64] text-[16px] font-bold">
        取消
      </a>
      <button id="deleteFavoritesBtn" class="h-14 rounded-full border border-[#FCA5A5] bg-[#EF4444] text-white text-[16px] font-bold disabled:opacity-40 disabled:cursor-not-allowed" disabled>
        删除所选
      </button>
    </div>
  </div>

  <script>
    const watchChecks = Array.from(document.querySelectorAll(".watch-check"));
    const deleteFavoritesBtn = document.getElementById("deleteFavoritesBtn");
    const selectAllFavorites = document.getElementById("selectAllFavorites");

    function syncSelectedState() {
      const count = watchChecks.filter((item) => item.checked).length;
      if (deleteFavoritesBtn) {
        deleteFavoritesBtn.disabled = count === 0;
        deleteFavoritesBtn.textContent = count === 0 ? "删除所选" : `删除所选 (${count})`;
      }
      if (selectAllFavorites) {
        selectAllFavorites.checked = count > 0 && count === watchChecks.length;
        selectAllFavorites.indeterminate = count > 0 && count < watchChecks.length;
      }
    }

    if (selectAllFavorites) {
      selectAllFavorites.addEventListener("change", () => {
        watchChecks.forEach((item) => {
          item.checked = selectAllFavorites.checked;
        });
        syncSelectedState();
      });
    }

    watchChecks.forEach((item) => {
      item.addEventListener("change", syncSelectedState);
    });

    syncSelectedState();
  </script>
</body>
</html>
