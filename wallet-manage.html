<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>钱包管理</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body { font-family: "Inter", sans-serif; }
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 24;
    }
    .wallet-card-glow {
      box-shadow: 0 14px 28px rgba(31, 75, 255, 0.18);
    }
  </style>
</head>
<body class="bg-[#f5f6f7] min-h-screen text-[#1b1f24]">
  <header class="sticky top-0 z-20 bg-white/95 backdrop-blur border-b border-gray-100">
    <div class="max-w-md mx-auto px-4 py-3 flex items-center justify-between">
      <button type="button" onclick="history.back()" class="w-9 h-9 inline-flex items-center justify-center text-gray-700">
        <span class="text-[28px] leading-none">‹</span>
      </button>
      <p class="text-[17px] font-semibold">钱包</p>
      <div class="px-4 h-10 rounded-full border border-[#E5E7EB] bg-white inline-flex items-center gap-2 text-[15px] font-medium text-[#333]">
        <span class="w-3 h-3 rounded-full bg-[#245BFF]"></span>
        <span>已连接</span>
      </div>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 py-5 pb-10 space-y-6">
    <section class="rounded-[24px] bg-gradient-to-r from-[#1B4DFF] to-[#2947D8] wallet-card-glow px-6 py-7 text-white overflow-hidden relative">
      <div class="relative z-10">
        <p class="text-[14px] text-white/80">当前选择</p>
        <div class="mt-2 flex items-center gap-1.5">
          <p class="text-[22px] font-semibold tracking-wide">钱包 1</p>
          <span class="text-[24px] leading-none">⌄</span>
        </div>
      </div>
      <div class="absolute right-5 top-1/2 -translate-y-1/2">
        <div class="w-[96px] h-[96px] rounded-[22px] bg-white/8 border border-white/10"></div>
        <div class="absolute left-5 top-5 w-[76px] h-[76px] rounded-[18px] bg-white/8 border border-white/10"></div>
        <div class="absolute left-9 top-9 w-8 h-8 rounded-full bg-white/10"></div>
        <div class="absolute right-2 top-2 w-[54px] h-[54px] rounded-[16px] bg-white/14 backdrop-blur flex items-center justify-center">
          <span class="material-symbols-outlined text-[28px]">wallet</span>
        </div>
      </div>
    </section>

    <section>
      <p class="text-[15px] font-medium text-[#6B7280] mb-4">地址列表</p>

      <div class="space-y-4">
        <div class="rounded-[22px] border border-[#E6E6E6] bg-white px-5 py-5 flex items-center justify-between gap-4">
          <div class="flex items-center gap-4">
            <div class="w-[62px] h-[62px] rounded-full bg-[#EEF1F5] flex items-center justify-center text-[28px] font-semibold text-[#2C2F35]">₿</div>
            <div>
              <p class="text-[17px] font-medium text-[#4B5563]">Solana</p>
              <p class="text-[18px] font-semibold text-[#1F2937] mt-1">AU7w...eEbu</p>
            </div>
          </div>
          <div class="flex items-center gap-5">
            <span class="material-symbols-outlined text-[28px] text-[#6B7280]">open_in_new</span>
            <span class="w-10 h-10 rounded-full border-[4px] border-[#245BFF] inline-flex items-center justify-center">
              <span class="w-3 h-3 rounded-full bg-[#245BFF]"></span>
            </span>
          </div>
        </div>

        <div class="rounded-[22px] border border-[#E6E6E6] bg-white px-5 py-5 flex items-center justify-between gap-4">
          <div class="flex items-center gap-4">
            <div class="w-[62px] h-[62px] rounded-full bg-[#EEF1F5] flex items-center justify-center">
              <span class="material-symbols-outlined text-[30px] text-[#2C2F35]">kid_star</span>
            </div>
            <div>
              <p class="text-[17px] font-medium text-[#4B5563]">Ethereum</p>
              <p class="text-[18px] font-semibold text-[#1F2937] mt-1">0xe3...6322</p>
            </div>
          </div>
          <div class="flex items-center gap-5">
            <span class="material-symbols-outlined text-[28px] text-[#6B7280]">open_in_new</span>
            <span class="w-10 h-10 rounded-full border-[4px] border-[#C9CEE3] inline-flex items-center justify-center"></span>
          </div>
        </div>
      </div>
    </section>

    <button class="w-full h-[60px] rounded-[18px] bg-gradient-to-r from-[#1B4DFF] to-[#2947D8] text-white text-[18px] font-semibold wallet-card-glow inline-flex items-center justify-center gap-3">
      <span class="material-symbols-outlined text-[24px]">signature</span>
      <span>签名消息</span>
    </button>

    <button class="w-full h-[60px] rounded-[18px] bg-[#E9EDF2] text-[#1F2937] text-[18px] font-medium inline-flex items-center justify-center gap-3">
      <span class="material-symbols-outlined text-[24px]">account_balance_wallet</span>
      <span>充值</span>
    </button>

    <div class="grid grid-cols-2 gap-4">
      <button class="h-[54px] rounded-[18px] bg-white border border-[#E6E6E6] text-[17px] font-medium text-[#1F2937] inline-flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-[22px]">upload</span>
        <span>导出钱包</span>
      </button>
      <button class="h-[54px] rounded-[18px] bg-white border border-[#E6E6E6] text-[17px] font-medium text-[#1F2937] inline-flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-[22px]">download</span>
        <span>导入钱包</span>
      </button>
    </div>
  </main>
</body>
</html>
