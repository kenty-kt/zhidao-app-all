<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>盯盘 - ZhiDao AI</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body { font-family: "Inter", sans-serif; }
    .font-headline { font-family: "Manrope", sans-serif; }
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 24; }
    .status-bar-safe { padding-top: env(safe-area-inset-top); }
    .bottom-nav-safe { padding-bottom: env(safe-area-inset-bottom); }
    .top-tab.active { color: #111827; border-bottom: 2px solid #f59e0b; font-weight: 700; }
    .market-tab.active { background: #fff; color: #111827; border-color: #e5e7eb; font-weight: 700; }
  </style>
</head>
<body class="bg-[#f3f3f4] text-[#2c2f30] min-h-screen pb-56">
  <header class="status-bar-safe sticky top-0 z-50 bg-white/90 backdrop-blur border-b border-gray-100">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="w-8"></div>
      <div class="text-center">
        <p class="font-headline font-extrabold tracking-tight">盯盘</p>
      </div>
      <a href="wallet.html" aria-label="个人中心" class="inline-flex items-center justify-center w-9 h-9 rounded-full bg-gray-100 text-gray-700">
        <span class="material-symbols-outlined text-[20px]">account_circle</span>
      </a>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-4 pb-44">
    <section class="bg-white rounded-3xl border border-gray-100 shadow-sm p-4">
      <div class="border-b border-gray-100 mb-4">
        <div class="flex items-center justify-between gap-3">
          <div class="flex items-center gap-4 text-sm text-gray-500 overflow-x-auto whitespace-nowrap">
            <button class="top-tab active py-2.5 border-b-2 border-transparent" data-watch-tab="favorites">自选</button>
            <button class="top-tab py-2.5 border-b-2 border-transparent" data-watch-tab="triggers">触发</button>
            <button class="top-tab py-2.5 border-b-2 border-transparent" data-watch-tab="positions">持仓</button>
          </div>
          <div class="flex items-center gap-2 shrink-0">
            <a id="manageFavoritesBtn" href="ai-watch-detail.html" class="inline-flex items-center justify-center rounded-2xl border border-[#F4CF63] bg-[#FFF9E8] px-4 py-2 text-sm font-bold text-[#B56412] shadow-sm" title="批量删除自选" aria-label="批量删除自选">
              管理自选
            </a>
            <button class="w-10 h-10 inline-flex items-center justify-center rounded-full text-[#98A2B3] hover:bg-gray-100" title="搜索">
              <span class="material-symbols-outlined text-[22px]">search</span>
            </button>
          </div>
        </div>
      </div>

      <div id="favoritesPanel">
        <div id="watchPairsList" class="space-y-3 border-t border-gray-100 pt-4"></div>
      </div>

      <div id="triggersPanel" class="hidden space-y-3">
        <div class="flex items-center gap-3 text-sm overflow-x-auto whitespace-nowrap">
          <a href="ai-watch-trigger-detail.html" class="inline-flex items-center gap-2 rounded-full bg-gray-100 px-4 py-2 font-semibold text-gray-500">
            <span>今日触发</span>
            <span class="text-lg leading-none text-gray-400">1</span>
          </a>
        </div>

        <div class="block border-t border-gray-100 pt-5">
          <div class="grid grid-cols-[1.4fr_0.6fr_0.6fr] items-center gap-3">
            <div>
              <div class="flex items-end gap-2">
                <p class="font-bold text-gray-900">BTC/USDT</p>
                <p class="text-xs text-gray-400 font-semibold">永续</p>
              </div>
              <div class="flex items-center gap-3 mt-2">
                <span class="font-bold text-gray-900">68,420.20</span>
                <span class="font-bold text-rose-500">+2.84%</span>
              </div>
            </div>
            <div class="text-center">
              <p class="text-[24px] leading-none font-black text-gray-900">0</p>
              <a href="ai-watch-config.html?symbol=BTC%2FUSDT&price=68%2C420.20&change=%2B2.84%25" class="inline-block text-xs text-gray-400 mt-2 hover:text-gray-600">监控中</a>
            </div>
            <div class="text-center">
              <p class="text-[24px] leading-none font-black text-gray-900">1</p>
              <a href="ai-watch-trigger-signal-detail.html?symbol=BTC%2FUSDT&type=macro" class="inline-block text-xs text-gray-400 mt-2 hover:text-gray-600">今日触发</a>
            </div>
          </div>
        </div>
      </div>

      <div id="positionsPanel" class="hidden">
        <div class="flex items-center gap-2 text-xs text-gray-500 overflow-x-auto whitespace-nowrap mb-4">
          <button class="market-tab active px-2.5 py-1 rounded-full border border-transparent" data-position-type="current">当前持仓</button>
          <button class="market-tab px-2.5 py-1 rounded-full border border-transparent" data-position-type="history">历史持仓</button>
        </div>

        <div id="positionsList" class="space-y-3 border-t border-gray-100 pt-4"></div>

        <p id="positionsStatus" class="text-[11px] text-gray-400 mt-3">当前共 3 个持仓，组合未实现盈亏 +65.5U</p>
      </div>
    </section>
  </main>

  <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-gray-100 bottom-nav-safe z-50">
    <div class="w-full max-w-md mx-auto px-4 pb-4 pt-3">
      <div class="grid grid-cols-4 gap-2 mb-3">
        <a href="ai-chat.html" class="flex flex-col items-center gap-1 text-[11px] font-semibold text-gray-400">
          <span class="material-symbols-outlined text-[21px]">smart_toy</span>
          <span>agent</span>
        </a>
        <a href="Image 2.html" class="flex flex-col items-center gap-1 text-[11px] font-semibold text-gray-400">
          <span class="material-symbols-outlined text-[21px]">explore</span>
          <span>发现</span>
        </a>
        <a href="ai-watch.html" class="flex flex-col items-center gap-1 text-[11px] font-bold text-gray-900">
          <span class="material-symbols-outlined text-[21px]">notifications</span>
          <span>盯盘</span>
          <span class="h-0.5 w-7 rounded-full bg-gray-900"></span>
        </a>
        <a href="wallet.html" class="flex flex-col items-center gap-1 text-[11px] font-semibold text-gray-400">
          <span class="material-symbols-outlined text-[21px]">account_circle</span>
          <span>账户</span>
        </a>
      </div>
      <div class="flex items-center justify-between gap-3">
        <a href="news.html" class="w-12 h-12 flex-shrink-0 border border-gray-300 rounded-full flex items-center justify-center bg-white text-[10px] font-black text-gray-500 shadow-sm">
          快讯
        </a>
        <button id="openAiAssistantInput" type="button" class="flex-grow h-12 bg-white rounded-full border border-gray-300 px-4 flex items-center shadow-sm text-left">
          <span class="flex-grow text-sm text-gray-400">提问或搜索</span>
        </button>
        <a href="market.html" class="w-12 h-12 flex-shrink-0 border border-gray-300 rounded-full flex items-center justify-center bg-white text-[10px] font-black text-gray-500 shadow-sm">
          行情
        </a>
      </div>
      <p class="text-[9px] text-gray-400 mt-2 text-center">内容由AI生成，不构成投资建议</p>
    </div>
  </div>

  <script>
    const tabs = Array.from(document.querySelectorAll("[data-watch-tab]"));
    const positionTypeTabs = Array.from(document.querySelectorAll("[data-position-type]"));
    const watchPairsList = document.getElementById("watchPairsList");
    const positionsList = document.getElementById("positionsList");
    const positionsStatus = document.getElementById("positionsStatus");
    const manageFavoritesBtn = document.getElementById("manageFavoritesBtn");
    const panels = {
      favorites: document.getElementById("favoritesPanel"),
      triggers: document.getElementById("triggersPanel"),
      positions: document.getElementById("positionsPanel"),
    };
    const watchPairs = [
        { symbol: "BTC/USDT", volume: "$3.28亿", price: "68,420.20", usd: "$68,420.20", change: "+2.84%", positive: true, alert: "运行中", leftCount: "1", rightCount: "0" },
        { symbol: "ETH/USDT", volume: "$1.94亿", price: "3,480.66", usd: "$3,480.66", change: "+1.42%", positive: true, alert: "接近触发", leftCount: "1", rightCount: "1" },
        { symbol: "SOL/USDT", volume: "$8,420万", price: "152.84", usd: "$152.84", change: "-0.88%", positive: false, alert: "运行中", leftCount: "1", rightCount: "0" },
        { symbol: "BNB/USDT", volume: "$6,330万", price: "598.20", usd: "$598.20", change: "+0.76%", positive: true, alert: "正常", leftCount: "1", rightCount: "0" },
        { symbol: "XRP/USDT", volume: "$5,120万", price: "0.6248", usd: "$0.6248", change: "-1.15%", positive: false, alert: "等待中", leftCount: "1", rightCount: "0" },
        { symbol: "DOGE/USDT", volume: "$4,870万", price: "0.1682", usd: "$0.1682", change: "+3.12%", positive: true, alert: "运行中", leftCount: "1", rightCount: "0" },
        { symbol: "BTC 永续", volume: "$5.62亿", price: "68,452.10", usd: "$68,452.10", change: "+3.06%", positive: true, alert: "爆仓提醒", leftCount: "1", rightCount: "1" },
        { symbol: "ETH 永续", volume: "$2.41亿", price: "3,486.00", usd: "$3,486.00", change: "+1.66%", positive: true, alert: "资金费率", leftCount: "1", rightCount: "1" },
        { symbol: "SOL 永续", volume: "$1.03亿", price: "153.12", usd: "$153.12", change: "-1.02%", positive: false, alert: "运行中", leftCount: "1", rightCount: "0" },
        { symbol: "1000PEPE 永续", volume: "$7,860万", price: "0.01284", usd: "$0.01284", change: "+5.82%", positive: true, alert: "高波动", leftCount: "1", rightCount: "1" }
    ];
    const positionPairs = {
      current: [
        { symbol: "BTC", market: "永续", price: "68,452.10", change: "+2.30%", leftCount: "1", leftLabel: "监控中", rightCount: "1", rightLabel: "今日触发", rightTone: "text-gray-900", volume: "持仓 0.25 · 浮盈 +82.1U" },
        { symbol: "ETH", market: "永续", price: "3,486.00", change: "+1.12%", leftCount: "1", leftLabel: "监控中", rightCount: "0", rightLabel: "今日触发", rightTone: "text-gray-900", volume: "持仓 2.40 · 浮盈 +44.3U" },
        { symbol: "SOL", market: "永续", price: "153.12", change: "-1.02%", leftCount: "1", leftLabel: "监控中", rightCount: "1", rightLabel: "今日触发", rightTone: "text-gray-900", volume: "持仓 12 · 浮盈 -60.9U" }
      ],
      history: [
        { symbol: "BTC", market: "永续", price: "67,980.40", change: "+1.84%", leftCount: "0", leftLabel: "监控中", rightCount: "2", rightLabel: "今日触发", rightTone: "text-gray-900", volume: "平仓 0.18 · 已实现 +56.4U" },
        { symbol: "ETH", market: "永续", price: "3,420.18", change: "-0.62%", leftCount: "0", leftLabel: "监控中", rightCount: "1", rightLabel: "今日触发", rightTone: "text-gray-900", volume: "平仓 1.20 · 已实现 +18.7U" },
        { symbol: "DOGE", market: "永续", price: "0.1624", change: "+4.22%", leftCount: "0", leftLabel: "监控中", rightCount: "1", rightLabel: "今日触发", rightTone: "text-gray-900", volume: "平仓 8,000 · 已实现 -12.3U" }
      ]
    };
    let selectedPositionType = "current";

    function toPairSymbol(symbol) {
      return symbol.includes("/USDT") ? symbol : `${symbol.replace(" 永续", "").replace("USDT", "").trim()}/USDT`;
    }

    function buildConfigHref(symbol, price, change) {
      return `ai-watch-config.html?symbol=${encodeURIComponent(toPairSymbol(symbol))}&price=${encodeURIComponent(price)}&change=${encodeURIComponent(change)}`;
    }

    function buildTriggerHref(symbol) {
      return `ai-watch-trigger-signal-detail.html?symbol=${encodeURIComponent(toPairSymbol(symbol))}&type=macro`;
    }

    function renderWatchRows() {
      if (!watchPairsList) return;
      const items = watchPairs || [];
      watchPairsList.innerHTML = "";
      items.forEach((item) => {
        const row = document.createElement("div");
        const configHref = buildConfigHref(item.symbol, item.price, item.change);
        const triggerHref = buildTriggerHref(item.symbol);
        row.className = "block rounded-2xl border border-gray-100 bg-white px-4 py-4 hover:bg-gray-50";
        row.innerHTML = `
          <div class="grid grid-cols-[1.4fr_0.6fr_0.6fr] items-center gap-3">
            <div>
              <div class="flex items-end gap-2">
                <p class="font-bold text-gray-900">${item.symbol}</p>
                <p class="text-xs text-gray-400 font-semibold">永续</p>
              </div>
              <div class="flex items-center gap-3 mt-2">
                <span class="font-bold text-gray-900">${item.price}</span>
                <span class="font-bold ${item.positive ? "text-rose-500" : "text-emerald-600"}">${item.change}</span>
              </div>
              <p class="text-xs text-gray-400 mt-2">${item.volume}</p>
            </div>
            <div class="text-center">
              <p class="text-[24px] leading-none font-black text-gray-900">${item.leftCount || "1"}</p>
              <a href="${configHref}" class="inline-block text-xs text-gray-400 mt-2 hover:text-gray-600">监控中</a>
            </div>
            <div class="text-center">
              <p class="text-[24px] leading-none font-black text-gray-900">${item.rightCount || "0"}</p>
              <a href="${triggerHref}" class="inline-block text-xs text-gray-400 mt-2 hover:text-gray-600">今日触发</a>
            </div>
          </div>
        `;
        watchPairsList.appendChild(row);
      });
    }

    function renderPositionRows() {
      if (!positionsList) return;
      const items = positionPairs[selectedPositionType] || [];
      positionsList.innerHTML = "";
      items.forEach((item) => {
        const row = document.createElement("div");
        const configHref = buildConfigHref(`${item.symbol}/USDT`, item.price, item.change);
        const triggerHref = buildTriggerHref(`${item.symbol}/USDT`);
        row.className = "block rounded-2xl border border-gray-100 bg-white px-4 py-4 hover:bg-gray-50";
        row.innerHTML = `
          <div class="grid grid-cols-[1.4fr_0.6fr_0.6fr] items-center gap-3">
            <div>
              <div class="flex items-end gap-2">
                <p class="font-bold text-gray-900">${item.symbol}/USDT</p>
                <p class="text-xs text-gray-400 font-semibold">${item.market}</p>
              </div>
              <div class="flex items-center gap-3 mt-2">
                <span class="font-bold text-gray-900">${item.price}</span>
                <span class="font-bold ${item.change.startsWith("-") ? "text-emerald-600" : "text-rose-500"}">${item.change}</span>
              </div>
              <p class="text-xs text-gray-400 mt-2">${item.volume}</p>
            </div>
            <div class="text-center">
              <p class="text-[24px] leading-none font-black text-gray-900">${item.leftCount}</p>
              <a href="${configHref}" class="inline-block text-xs text-gray-400 mt-2 hover:text-gray-600">${item.leftLabel}</a>
            </div>
            <div class="text-center">
              <p class="text-[24px] leading-none font-black ${item.rightTone}">${item.rightCount}</p>
              <a href="${triggerHref}" class="inline-block text-xs text-gray-400 mt-2 hover:text-gray-600">${item.rightLabel}</a>
            </div>
          </div>
        `;
        positionsList.appendChild(row);
      });
      if (positionsStatus) {
        positionsStatus.textContent = selectedPositionType === "current"
          ? "当前共 3 个持仓，组合未实现盈亏 +65.5U"
          : "历史共 3 笔持仓，累计已实现盈亏 +62.8U";
      }
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        const current = tab.dataset.watchTab;
        tabs.forEach((item) => item.classList.toggle("active", item === tab));
        Object.entries(panels).forEach(([key, panel]) => {
          if (!panel) return;
          panel.classList.toggle("hidden", key !== current);
        });
        if (manageFavoritesBtn) {
          manageFavoritesBtn.classList.toggle("hidden", current !== "favorites");
        }
      });
    });

    positionTypeTabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        selectedPositionType = tab.dataset.positionType || "current";
        positionTypeTabs.forEach((item) => item.classList.toggle("active", item === tab));
        renderPositionRows();
      });
    });

    renderWatchRows();
    renderPositionRows();
  </script>
  <script src="inline-assistant-composer.js"></script>
  <script>
    const watchAiTrigger = document.getElementById("openAiAssistantInput");
    if (watchAiTrigger) {
      watchAiTrigger.addEventListener("click", () => {
        if (window.openInlineAssistantComposer) window.openInlineAssistantComposer();
      });
    }
  </script>
  <script src="auth-modal.js"></script>
</body>
</html>
