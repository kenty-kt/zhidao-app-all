<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>监控条件 - ZhiDao AI</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body { font-family: "Inter", sans-serif; }
    .font-headline { font-family: "Manrope", sans-serif; }
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 24; }
    .status-bar-safe { padding-top: env(safe-area-inset-top); }
    .watch-check:checked + .watch-card {
      border-color: #f2b94b;
      background: #fffaf0;
      color: #111827;
      box-shadow: 0 0 0 1px rgba(242, 185, 75, 0.18) inset;
    }
    .watch-check:checked + .watch-card .watch-dot {
      border-color: #f59e0b;
      background: #f59e0b;
      box-shadow: inset 0 0 0 3px #fff;
    }
  </style>
</head>
<body class="bg-[#f3f3f4] text-[#2c2f30] min-h-screen pb-32">
  <header class="status-bar-safe sticky top-0 z-50 bg-white/90 backdrop-blur border-b border-gray-100">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <button type="button" onclick="history.back()" class="w-9 h-9 inline-flex items-center justify-center rounded-full bg-gray-100 text-gray-700">
        <span class="material-symbols-outlined text-[20px]">arrow_back</span>
      </button>
      <div class="text-center">
        <p class="font-headline font-extrabold tracking-tight">监控条件</p>
      </div>
      <div class="w-9 h-9"></div>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-4 pb-24">
    <div class="space-y-6">
      <section class="bg-white rounded-3xl border border-gray-100 shadow-sm px-4 py-4">
        <div class="grid grid-cols-[1.1fr_1fr_auto] items-center gap-3">
          <div>
            <p id="configSymbol" class="text-[18px] font-black text-gray-900">BTC/USDT</p>
            <p class="text-sm text-gray-400 font-semibold mt-1">修改当前资产的监控条件</p>
          </div>
          <div class="text-right">
            <p id="configPrice" class="text-[18px] font-black text-gray-900">68,420.20</p>
            <p id="configUsd" class="text-sm text-gray-400 font-semibold mt-1">$68,420.20</p>
          </div>
          <div class="justify-self-end">
            <span id="configChange" class="inline-flex items-center rounded-2xl bg-emerald-500 px-4 py-2 text-[15px] font-black text-white">+2.84%</span>
          </div>
        </div>
      </section>

      <section class="bg-white rounded-3xl border border-gray-100 shadow-sm px-5 py-5 space-y-3">
        <div class="flex items-center justify-between gap-3">
          <div class="flex items-center gap-2">
            <span class="w-1.5 h-6 rounded-full bg-[#FF4D5A]"></span>
            <h2 class="font-headline text-[18px] font-extrabold text-gray-900">宏观事件</h2>
          </div>
          <label class="inline-flex items-center gap-2 text-sm font-bold text-gray-700 cursor-pointer">
            <input type="checkbox" class="section-toggle accent-amber-500" data-section="macro-items" />
            <span>全选</span>
          </label>
        </div>
        <div id="macro-items" class="flex flex-wrap gap-3">
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" checked /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>美国CPI / PPI / PCE</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>美联储利率决议</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" checked /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>ETF资金异动</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>美国非农就业数据</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>美元指数 DXY 异动</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>美国国债收益率异动</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>SEC / CFTC 监管表态</span></label>
        </div>
      </section>

      <section class="bg-white rounded-3xl border border-gray-100 shadow-sm px-5 py-5 space-y-3">
        <div class="flex items-center justify-between gap-3">
          <div class="flex items-center gap-2">
            <span class="w-1.5 h-6 rounded-full bg-[#FF4D5A]"></span>
            <h2 class="font-headline text-[18px] font-extrabold text-gray-900">项目公告</h2>
          </div>
          <label class="inline-flex items-center gap-2 text-sm font-bold text-gray-700 cursor-pointer">
            <input type="checkbox" class="section-toggle accent-amber-500" data-section="project-items" />
            <span>全选</span>
          </label>
        </div>
        <div id="project-items" class="flex flex-wrap gap-3">
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" checked /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>主网升级 / 硬分叉</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>代币解锁公告</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>治理投票结果</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>项目方增发 / 销毁公告</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" checked /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>重大合作 / 生态扩张</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>空投快照公告</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>大额回购销毁</span></label>
        </div>
      </section>

      <section class="bg-white rounded-3xl border border-gray-100 shadow-sm px-5 py-5 space-y-3">
        <div class="flex items-center justify-between gap-3">
          <div class="flex items-center gap-2">
            <span class="w-1.5 h-6 rounded-full bg-[#FF4D5A]"></span>
            <h2 class="font-headline text-[18px] font-extrabold text-gray-900">重大风险</h2>
          </div>
          <label class="inline-flex items-center gap-2 text-sm font-bold text-gray-700 cursor-pointer">
            <input type="checkbox" class="section-toggle accent-amber-500" data-section="risk-items" />
            <span>全选</span>
          </label>
        </div>
        <div id="risk-items" class="flex flex-wrap gap-3">
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" checked /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>巨鲸转入交易所</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" checked /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>合约爆仓放大</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>黑客攻击披露</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>项目团队异动 / 跑路</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>监管处罚 / 封禁公告</span></label>
        </div>
      </section>

      <section class="bg-white rounded-3xl border border-gray-100 shadow-sm px-5 py-5 space-y-3">
        <div class="flex items-center justify-between gap-3">
          <div class="flex items-center gap-2">
            <span class="w-1.5 h-6 rounded-full bg-[#FF4D5A]"></span>
            <h2 class="font-headline text-[18px] font-extrabold text-gray-900">主力动向</h2>
          </div>
          <label class="inline-flex items-center gap-2 text-sm font-bold text-gray-700 cursor-pointer">
            <input type="checkbox" class="section-toggle accent-amber-500" data-section="whale-items" />
            <span>全选</span>
          </label>
        </div>
        <div id="whale-items" class="flex flex-wrap gap-3">
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" checked /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>巨鲸建仓信号</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" checked /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>主力拉升信号</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>巨鲸出货信号</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>主力撤退信号</span></label>
        </div>
      </section>

      <section class="bg-white rounded-3xl border border-gray-100 shadow-sm px-5 py-5 space-y-3">
        <div class="flex items-center justify-between gap-3">
          <div class="flex items-center gap-2">
            <span class="w-1.5 h-6 rounded-full bg-[#FF4D5A]"></span>
            <h2 class="font-headline text-[18px] font-extrabold text-gray-900">日内高低价</h2>
          </div>
          <label class="inline-flex items-center gap-2 text-sm font-bold text-gray-700 cursor-pointer">
            <input type="checkbox" class="section-toggle accent-amber-500" data-section="intraday-items" />
            <span>全选</span>
          </label>
        </div>
        <div id="intraday-items" class="flex flex-wrap gap-3">
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" checked /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>日内底部信号（RSI超卖）</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>日内顶部信号（RSI超买）</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" checked /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>突破前高 / 跌破前低</span></label>
          <label class="cursor-pointer"><input type="checkbox" class="watch-check hidden" /><span class="watch-card inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#F6F5FF] border border-transparent text-sm text-gray-800"><span class="watch-dot w-4 h-4 rounded-full border border-gray-300 bg-white"></span>价格振幅超 1.5%</span></label>
        </div>
      </section>
    </div>
  </main>

  <div class="fixed bottom-0 left-0 right-0 bg-white/96 backdrop-blur border-t border-gray-100 z-40">
    <div class="max-w-3xl mx-auto px-4 py-4 grid grid-cols-2 gap-4">
      <a href="ai-watch.html" class="inline-flex items-center justify-center h-14 rounded-full border border-[#F2B9C0] text-[#E24B64] text-[16px] font-bold">取消</a>
      <button class="h-14 rounded-full border border-[#F2B9C0] text-[#E24B64] text-[16px] font-bold bg-white">保存修改</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const symbol = params.get("symbol") || "BTC/USDT";
    const price = params.get("price") || "68,420.20";
    const change = params.get("change") || "+2.84%";
    const configSymbol = document.getElementById("configSymbol");
    const configPrice = document.getElementById("configPrice");
    const configUsd = document.getElementById("configUsd");
    const configChange = document.getElementById("configChange");
    const sectionToggles = Array.from(document.querySelectorAll(".section-toggle"));

    if (configSymbol) configSymbol.textContent = symbol;
    if (configPrice) configPrice.textContent = price;
    if (configUsd) configUsd.textContent = `$${price}`;
    if (configChange) {
      configChange.textContent = change;
      configChange.classList.toggle("bg-red-500", change.startsWith("-"));
      configChange.classList.toggle("bg-emerald-500", !change.startsWith("-"));
    }

    sectionToggles.forEach((toggle) => {
      toggle.addEventListener("change", () => {
        const container = document.getElementById(toggle.dataset.section);
        if (!container) return;
        container.querySelectorAll(".watch-check").forEach((item) => {
          item.checked = toggle.checked;
        });
      });
    });
  </script>
</body>
</html>
