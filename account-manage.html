<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>账号管理</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body { font-family: "Inter", sans-serif; }
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 24;
    }
  </style>
</head>
<body class="bg-[#f5f6f7] min-h-screen text-[#1b1f24]">
  <header class="sticky top-0 z-20 bg-white/95 backdrop-blur border-b border-gray-100">
    <div class="max-w-md mx-auto px-4 py-3 flex items-center justify-between">
      <button type="button" onclick="history.back()" class="w-9 h-9 inline-flex items-center justify-center text-gray-700">
        <span class="text-[28px] leading-none">‹</span>
      </button>
      <p class="text-[17px] font-semibold">账号管理</p>
      <div class="w-9 h-9"></div>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 py-5 space-y-4 pb-10">
    <section class="rounded-[20px] border border-[#E6E6E6] bg-white px-5 py-5">
      <p class="text-[15px] text-[#6B7280]">用户名</p>
      <div class="mt-4 flex items-center justify-between gap-4">
        <p class="text-[18px] font-semibold text-[#222]">user-1776061624348</p>
        <span class="material-symbols-outlined text-[24px] text-[#8A8FA3]">edit</span>
      </div>
    </section>

    <section class="rounded-[20px] border border-[#E6E6E6] bg-white px-5 py-5">
      <p class="text-[15px] text-[#6B7280]">邮箱</p>
      <div class="mt-4 flex items-center justify-between gap-4">
        <div class="flex items-center gap-2">
          <p class="text-[18px] font-semibold text-[#222]">kingtintv@gmail.com</p>
          <span class="material-symbols-outlined text-[20px] text-[#245BFF]">verified</span>
        </div>
        <span class="material-symbols-outlined text-[24px] text-[#8A8FA3]">edit</span>
      </div>
    </section>

    <section class="pt-3">
      <p class="text-[15px] font-semibold text-[#4B5563] mb-3">认证方式</p>

      <div class="space-y-4">
        <div class="rounded-[20px] border border-[#E6E6E6] bg-white px-5 py-5 flex items-center justify-between gap-4">
          <div class="flex items-center gap-4">
            <span class="material-symbols-outlined text-[28px] text-[#4B5563]">mail</span>
            <span class="text-[18px] font-medium text-[#222]">邮箱</span>
          </div>
          <span class="text-[16px] font-semibold text-[#245BFF]">已关联</span>
        </div>

        <div class="rounded-[20px] border border-[#E6E6E6] bg-white px-5 py-5 flex items-center justify-between gap-4">
          <div class="flex items-center gap-4">
            <span class="material-symbols-outlined text-[28px] text-[#4B5563]">account_circle</span>
            <span class="text-[18px] font-medium text-[#222]">谷歌</span>
          </div>
          <span class="text-[16px] font-semibold text-[#245BFF]">已关联</span>
        </div>

        <div class="rounded-[20px] border border-[#E6E6E6] bg-white px-5 py-5 flex items-center justify-between gap-4">
          <div class="flex items-center gap-4">
            <span class="text-[20px] font-semibold text-[#4B5563]">iOS</span>
            <span class="text-[18px] font-medium text-[#222]">苹果</span>
          </div>
          <button class="h-[42px] px-6 rounded-full bg-[#E9EDF3] text-[16px] font-medium text-[#333]">连接</button>
        </div>
      </div>
    </section>

    <button class="w-full h-[58px] rounded-[18px] bg-[#ECEFF3] text-[17px] font-medium text-[#222] mt-6">
      登出
    </button>

    <button class="w-full h-[58px] rounded-[18px] bg-[#FDE3DE] text-[17px] font-medium text-[#D93025]">
      注销账号
    </button>
  </main>
</body>
</html>
