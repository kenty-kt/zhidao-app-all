<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>交易详情 - Binance</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body { font-family: "Inter", sans-serif; }
    .font-headline { font-family: "Manrope", sans-serif; }
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 24; }
    .status-bar-safe { padding-top: env(safe-area-inset-top); }
    .bottom-nav-safe { padding-bottom: env(safe-area-inset-bottom); }
    .interval-btn.active { background: #fff; color: #111827; font-weight: 700; }
  </style>
</head>
<body class="bg-[#f5f6f7] text-[#2c2f30] min-h-screen pb-56">
  <header class="status-bar-safe sticky top-0 z-50 bg-white/95 backdrop-blur border-b border-gray-100">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
      <button type="button" onclick="history.back()" class="inline-flex items-center gap-1 text-gray-500 hover:text-gray-900">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
      <div class="text-center">
        <p id="pairTitle" class="font-headline font-extrabold tracking-tight text-xl">BTC/USDT</p>
        <p class="text-[11px] text-gray-400">Binance</p>
      </div>
      <a href="wallet.html" aria-label="个人中心" class="inline-flex items-center justify-center w-9 h-9 rounded-full bg-gray-100 text-gray-700"><span class="material-symbols-outlined text-[20px]">account_circle</span></a>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-4 pb-44 space-y-4">
    <section class="grid md:grid-cols-[1fr_1.1fr] gap-4">
      <div>
        <p id="lastPrice" class="text-5xl font-black text-rose-500">--</p>
        <p id="priceSub" class="text-2xl mt-1 text-gray-700">--</p>
      </div>
      <div class="grid grid-cols-2 gap-2 text-sm">
        <div><p class="text-gray-500">24h最高价</p><p id="highPrice" class="mt-1 font-semibold text-gray-900">--</p></div>
        <div><p class="text-gray-500">24h成交量(BTC)</p><p id="baseVol" class="mt-1 font-semibold text-gray-900">--</p></div>
        <div><p class="text-gray-500">24h最低价</p><p id="lowPrice" class="mt-1 font-semibold text-gray-900">--</p></div>
        <div><p class="text-gray-500">24h成交额(USDT)</p><p id="quoteVol" class="mt-1 font-semibold text-gray-900">--</p></div>
      </div>
    </section>

    <section class="rounded-2xl border border-gray-200 overflow-hidden bg-white">
      <div class="flex items-center justify-between px-3 py-2 bg-gray-50 border-b border-gray-200">
        <div class="flex items-center gap-1 text-sm bg-gray-100 rounded-xl p-1">
          <button class="interval-btn active px-2.5 py-1 rounded-lg" data-interval="1m">1分</button>
          <button class="interval-btn px-2.5 py-1 rounded-lg" data-interval="15m">15分</button>
          <button class="interval-btn px-2.5 py-1 rounded-lg" data-interval="1h">1小时</button>
          <button class="interval-btn px-2.5 py-1 rounded-lg" data-interval="4h">4小时</button>
          <button class="interval-btn px-2.5 py-1 rounded-lg" data-interval="1d">1日</button>
        </div>
        <button id="reloadChartBtn" class="text-xs px-2 py-1 rounded-lg bg-gray-100 text-gray-600">刷新</button>
      </div>
      <div class="px-3 py-2 text-xs text-gray-600 border-b border-gray-200">
        <span>MA5: <span id="ma5" class="text-amber-400">--</span></span>
        <span class="ml-3">MA10: <span id="ma10" class="text-fuchsia-400">--</span></span>
        <span class="ml-3">MA30: <span id="ma30" class="text-sky-400">--</span></span>
      </div>
      <div class="bg-white p-2">
        <canvas id="klineCanvas" width="1000" height="420" class="w-full h-[260px]"></canvas>
      </div>
    </section>

    <section class="grid md:grid-cols-2 gap-4">
      <div class="rounded-2xl border border-gray-200 overflow-hidden bg-white">
        <div class="px-3 py-2 bg-gray-50 border-b border-gray-200 font-semibold text-gray-900">订单簿（深度）</div>
        <div class="grid grid-cols-3 text-[11px] text-gray-500 px-3 py-2 border-b border-gray-200">
          <span>买量</span><span class="text-right">价格</span><span class="text-right">卖量</span>
        </div>
        <div id="depthList" class="text-xs"></div>
      </div>
      <div class="rounded-2xl border border-gray-200 overflow-hidden bg-white">
        <div class="px-3 py-2 bg-gray-50 border-b border-gray-200 font-semibold text-gray-900">最新成交</div>
        <div class="grid grid-cols-3 text-[11px] text-gray-500 px-3 py-2 border-b border-gray-200">
          <span>时间</span><span class="text-right">价格</span><span class="text-right">数量</span>
        </div>
        <div id="tradesList" class="text-xs"></div>
      </div>
    </section>

    <p id="statusText" class="text-xs text-gray-500">加载中...</p>
  </main>

  <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-gray-100 bottom-nav-safe z-50">
    <div class="w-full max-w-md mx-auto px-4 pb-4 pt-3">
      <div class="grid grid-cols-4 gap-2 mb-3">
        <a href="ai-chat.html" class="flex flex-col items-center gap-1 text-[11px] font-semibold text-gray-400">
          <span class="material-symbols-outlined text-[21px]">smart_toy</span>
          <span>agent</span>
        </a>
        <a href="Image 2.html" class="flex flex-col items-center gap-1 text-[11px] font-semibold text-gray-400">
          <span class="material-symbols-outlined text-[21px]">explore</span>
          <span>发现</span>
        </a>
        <a href="ai-watch.html" class="flex flex-col items-center gap-1 text-[11px] font-bold text-gray-900">
          <span class="material-symbols-outlined text-[21px]">notifications</span>
          <span>盯盘</span>
          <span class="h-0.5 w-7 rounded-full bg-gray-900"></span>
        </a>
        <a href="wallet.html" class="flex flex-col items-center gap-1 text-[11px] font-semibold text-gray-400">
          <span class="material-symbols-outlined text-[21px]">account_circle</span>
          <span>账户</span>
        </a>
      </div>
      <div class="flex items-center justify-between gap-3">
        <a href="news.html" class="w-12 h-12 flex-shrink-0 border border-[#8a6d00] rounded-full flex items-center justify-center bg-[#fff8d8] text-[10px] font-black text-[#8a6d00] shadow-sm">
          快讯
        </a>
        <div id="openAiAssistantInput" class="flex-grow h-12 bg-white rounded-full border border-gray-300 px-4 flex items-center cursor-pointer shadow-sm">
          <input id="aiAssistantInput" class="flex-grow text-sm border-none focus:ring-0 p-0 text-gray-700 bg-transparent placeholder:text-gray-400 cursor-pointer" placeholder="提问或搜索" type="text" readonly />
        </div>
        <a href="market.html" class="w-12 h-12 flex-shrink-0 border border-gray-300 rounded-full flex items-center justify-center bg-white text-[10px] font-black text-gray-500 shadow-sm">
          行情
        </a>
      </div>
      <p class="text-[9px] text-gray-400 mt-2 text-center">内容由AI生成，不构成投资建议</p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const symbol = (params.get("symbol") || "BTCUSDT").toUpperCase().replace(/[^A-Z0-9]/g, "");
    const pairTitleEl = document.getElementById("pairTitle");
    const lastPriceEl = document.getElementById("lastPrice");
    const priceSubEl = document.getElementById("priceSub");
    const highPriceEl = document.getElementById("highPrice");
    const lowPriceEl = document.getElementById("lowPrice");
    const baseVolEl = document.getElementById("baseVol");
    const quoteVolEl = document.getElementById("quoteVol");
    const ma5El = document.getElementById("ma5");
    const ma10El = document.getElementById("ma10");
    const ma30El = document.getElementById("ma30");
    const depthListEl = document.getElementById("depthList");
    const tradesListEl = document.getElementById("tradesList");
    const statusTextEl = document.getElementById("statusText");
    const reloadChartBtnEl = document.getElementById("reloadChartBtn");
    const intervalBtns = Array.from(document.querySelectorAll(".interval-btn"));
    const canvas = document.getElementById("klineCanvas");
    const ctx = canvas.getContext("2d");
    const openAiAssistantInputEl = document.getElementById("openAiAssistantInput");
    const aiAssistantInputEl = document.getElementById("aiAssistantInput");

    let currentInterval = "1m";
    let refreshTimer;

    function fmt(n, d = 2) {
      const x = Number(n);
      if (!Number.isFinite(x)) return "--";
      return x.toLocaleString("en-US", { minimumFractionDigits: d, maximumFractionDigits: d });
    }

    function fmtPct(n) {
      const x = Number(n);
      if (!Number.isFinite(x)) return "--";
      return `${x >= 0 ? "+" : ""}${x.toFixed(2)}%`;
    }

    function movingAverage(values, period) {
      if (values.length < period) return null;
      let sum = 0;
      for (let i = values.length - period; i < values.length; i++) sum += values[i];
      return sum / period;
    }

    function drawKline(klines) {
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      if (!klines.length) return;

      const highs = klines.map((k) => Number(k[2]));
      const lows = klines.map((k) => Number(k[3]));
      const closes = klines.map((k) => Number(k[4]));
      const max = Math.max(...highs);
      const min = Math.min(...lows);
      const range = Math.max(max - min, 1e-9);

      const left = 20;
      const right = w - 20;
      const top = 20;
      const bottom = h - 30;
      const chartW = right - left;
      const chartH = bottom - top;
      const n = klines.length;
      const step = chartW / n;
      const bodyW = Math.max(2, step * 0.65);

      ctx.strokeStyle = "rgba(31,41,55,0.12)";
      ctx.lineWidth = 1;
      for (let i = 0; i < 4; i++) {
        const y = top + (chartH / 3) * i;
        ctx.beginPath();
        ctx.moveTo(left, y);
        ctx.lineTo(right, y);
        ctx.stroke();
      }

      function yOf(price) {
        return top + ((max - price) / range) * chartH;
      }

      klines.forEach((k, i) => {
        const open = Number(k[1]);
        const high = Number(k[2]);
        const low = Number(k[3]);
        const close = Number(k[4]);
        const x = left + i * step + step / 2;
        const color = close >= open ? "#00c076" : "#ff3b5c";

        ctx.strokeStyle = color;
        ctx.beginPath();
        ctx.moveTo(x, yOf(high));
        ctx.lineTo(x, yOf(low));
        ctx.stroke();

        const y1 = yOf(open);
        const y2 = yOf(close);
        const topBody = Math.min(y1, y2);
        const hBody = Math.max(1, Math.abs(y1 - y2));
        ctx.fillStyle = color;
        ctx.fillRect(x - bodyW / 2, topBody, bodyW, hBody);
      });

      function drawMA(period, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        let started = false;
        for (let i = 0; i < closes.length; i++) {
          if (i + 1 < period) continue;
          let sum = 0;
          for (let j = i + 1 - period; j <= i; j++) sum += closes[j];
          const ma = sum / period;
          const x = left + i * step + step / 2;
          const y = yOf(ma);
          if (!started) {
            ctx.moveTo(x, y);
            started = true;
          } else {
            ctx.lineTo(x, y);
          }
        }
        ctx.stroke();
      }

      drawMA(5, "#ffb100");
      drawMA(10, "#c03cff");
      drawMA(30, "#21a8ff");
    }

    async function loadTicker() {
      const resp = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`, { cache: "no-store" });
      if (!resp.ok) throw new Error(`ticker ${resp.status}`);
      const t = await resp.json();
      const pct = Number(t.priceChangePercent);
      const positive = Number.isFinite(pct) ? pct >= 0 : false;
      lastPriceEl.textContent = fmt(t.lastPrice, Number(t.lastPrice) > 1000 ? 2 : 4);
      lastPriceEl.className = `text-5xl font-black ${positive ? "text-emerald-500" : "text-rose-500"}`;
      priceSubEl.innerHTML = `$${fmt(t.lastPrice, 2)} <span class="${positive ? "text-emerald-500" : "text-rose-500"}">${fmtPct(t.priceChangePercent)}</span>`;
      highPriceEl.textContent = `$${fmt(t.highPrice, 2)}`;
      lowPriceEl.textContent = `$${fmt(t.lowPrice, 2)}`;
      baseVolEl.textContent = fmt(t.volume, 2);
      quoteVolEl.textContent = fmt(t.quoteVolume, 2);
    }

    async function loadDepth() {
      const resp = await fetch(`https://api.binance.com/api/v3/depth?symbol=${symbol}&limit=20`, { cache: "no-store" });
      if (!resp.ok) throw new Error(`depth ${resp.status}`);
      const d = await resp.json();
      const bids = (d.bids || []).slice(0, 10);
      const asks = (d.asks || []).slice(0, 10);
      const len = Math.max(bids.length, asks.length);
      depthListEl.innerHTML = "";
      for (let i = 0; i < len; i++) {
        const b = bids[i] || ["", ""];
        const a = asks[i] || ["", ""];
        const row = document.createElement("div");
        row.className = "grid grid-cols-3 px-3 py-1 border-b border-gray-100";
        row.innerHTML = `
          <span class="text-emerald-400">${fmt(b[1], 4)}</span>
          <span class="text-right text-gray-700">${a[0] ? fmt(a[0], 2) : b[0] ? fmt(b[0], 2) : "--"}</span>
          <span class="text-right text-rose-400">${fmt(a[1], 4)}</span>
        `;
        depthListEl.appendChild(row);
      }
    }

    async function loadTrades() {
      const resp = await fetch(`https://api.binance.com/api/v3/trades?symbol=${symbol}&limit=20`, { cache: "no-store" });
      if (!resp.ok) throw new Error(`trades ${resp.status}`);
      const rows = await resp.json();
      tradesListEl.innerHTML = "";
      rows.forEach((t) => {
        const date = new Date(Number(t.time));
        const hh = String(date.getHours()).padStart(2, "0");
        const mm = String(date.getMinutes()).padStart(2, "0");
        const ss = String(date.getSeconds()).padStart(2, "0");
        const isBuyerMaker = Boolean(t.isBuyerMaker);
        const row = document.createElement("div");
        row.className = "grid grid-cols-3 px-3 py-1 border-b border-gray-100";
        row.innerHTML = `
          <span class="text-gray-400">${hh}:${mm}:${ss}</span>
          <span class="text-right ${isBuyerMaker ? "text-rose-400" : "text-emerald-400"}">${fmt(t.price, 2)}</span>
          <span class="text-right text-gray-700">${fmt(t.qty, 4)}</span>
        `;
        tradesListEl.appendChild(row);
      });
    }

    async function loadKlines() {
      const resp = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${currentInterval}&limit=80`, { cache: "no-store" });
      if (!resp.ok) throw new Error(`klines ${resp.status}`);
      const klines = await resp.json();
      drawKline(klines);
      const closes = klines.map((k) => Number(k[4]));
      ma5El.textContent = movingAverage(closes, 5) ? fmt(movingAverage(closes, 5), 2) : "--";
      ma10El.textContent = movingAverage(closes, 10) ? fmt(movingAverage(closes, 10), 2) : "--";
      ma30El.textContent = movingAverage(closes, 30) ? fmt(movingAverage(closes, 30), 2) : "--";
    }

    async function loadAll() {
      statusTextEl.textContent = "同步 Binance 数据中...";
      try {
        await Promise.all([loadTicker(), loadDepth(), loadTrades(), loadKlines()]);
        statusTextEl.textContent = `已更新 ${symbol} · ${new Date().toLocaleTimeString()}`;
      } catch (err) {
        console.error(err);
        statusTextEl.textContent = `加载失败：${err.message || "网络错误"}`;
      }
    }

    pairTitleEl.textContent = `${symbol.replace("USDT", "")}/USDT`;

    intervalBtns.forEach((btn) => {
      btn.addEventListener("click", () => {
        intervalBtns.forEach((x) => x.classList.remove("active"));
        btn.classList.add("active");
        currentInterval = btn.dataset.interval;
        loadKlines();
      });
    });

    if (reloadChartBtnEl) reloadChartBtnEl.addEventListener("click", loadAll);
    if (openAiAssistantInputEl) openAiAssistantInputEl.addEventListener("click", () => { if (window.openInlineAssistantComposer) window.openInlineAssistantComposer(); });
    if (aiAssistantInputEl) aiAssistantInputEl.addEventListener("focus", () => { aiAssistantInputEl.blur(); if (window.openInlineAssistantComposer) window.openInlineAssistantComposer(); });

    loadAll();
    refreshTimer = setInterval(loadAll, 10000);
  </script>
  <script src="inline-assistant-composer.js"></script>
  <script src="auth-modal.js"></script>
</body>
</html>
