<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>交易 - Binance 实时</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body { font-family: "Inter", sans-serif; }
    .font-headline { font-family: "Manrope", sans-serif; }
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 24; }
    .status-bar-safe { padding-top: env(safe-area-inset-top); }
    .bottom-nav-safe { padding-bottom: env(safe-area-inset-bottom); }
    .top-tab.active { color: #111827; border-bottom: 2px solid #f59e0b; font-weight: 700; }
    .market-tab.active { background: #fff; color: #111827; border-color: #e5e7eb; font-weight: 700; }
    .view-tab.active { background: #111827; color: #fff; border-color: #111827; font-weight: 700; }
  </style>
</head>
<body class="bg-[#f3f3f4] text-[#2c2f30] min-h-screen pb-56">
  <header class="status-bar-safe sticky top-0 z-50 bg-white/90 backdrop-blur border-b border-gray-100">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="w-8"></div>
      <div class="text-center">
        <p class="font-headline font-extrabold tracking-tight">行情</p>
      </div>
      <a href="wallet.html" aria-label="个人中心" class="inline-flex items-center justify-center w-9 h-9 rounded-full bg-gray-100 text-gray-700"><span class="material-symbols-outlined text-[20px]">account_circle</span></a>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-4 pb-44">
    <section class="bg-white rounded-3xl border border-gray-100 shadow-sm p-4">
      <div class="border-b border-gray-100 mb-3">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-4 text-sm text-gray-500 overflow-x-auto whitespace-nowrap">
            <button class="top-tab active py-2.5 border-b-2 border-transparent" data-market-tab="favorites">自选 <span id="favCountBadge" class="text-[11px] text-amber-600">(0)</span></button>
            <button class="top-tab py-2.5 border-b-2 border-transparent" data-market-tab="binance">币安</button>
            <button class="top-tab py-2.5 border-b-2 border-transparent" data-market-tab="okx">欧易</button>
            <button class="top-tab py-2.5 border-b-2 border-transparent" data-market-tab="hyperliquid">Hyperliquid</button>
          </div>
          <div class="flex items-center gap-1 text-gray-400">
            <button id="openFavManagerBtn" class="hidden px-2.5 py-1.5 rounded-lg bg-amber-50 text-amber-700 text-xs font-semibold border border-amber-200" title="管理自选">
              管理自选
            </button>
            <button class="p-1.5 rounded-lg hover:bg-gray-100" title="搜索">
              <span class="material-symbols-outlined text-[19px]">search</span>
            </button>
          </div>
        </div>
      </div>

      <div class="flex items-center justify-start mb-2">
        <div class="flex items-center gap-2 text-xs text-gray-500 overflow-x-auto whitespace-nowrap">
          <button class="market-tab active px-2.5 py-1 rounded-full border border-transparent" data-type-tab="spot">现货</button>
          <button class="market-tab px-2.5 py-1 rounded-full border border-transparent" data-type-tab="futures">合约</button>
        </div>
      </div>

      <div class="flex items-center justify-end mb-4">
        <button id="refreshBtn" class="inline-flex items-center gap-1 text-xs px-2.5 py-1.5 rounded-lg bg-gray-100 text-gray-600">
          <span class="material-symbols-outlined text-[15px]">refresh</span>刷新
        </button>
      </div>

      <div id="marketPanel">
        <div id="pairsHeader" class="grid text-[11px] text-gray-400 px-1 pb-2 border-b border-gray-100"></div>
        <div id="pairsList" class="divide-y divide-gray-100"></div>
        <p id="feedStatus" class="text-[11px] text-gray-400 mt-3">加载中...</p>
      </div>

      <div id="strategyPanel" class="hidden space-y-3">
        <div id="strategyList"></div>
      </div>
    </section>

    <section id="favManagerPanel" class="hidden mt-3 bg-white rounded-3xl border border-gray-100 shadow-sm p-4">
      <div class="flex items-center justify-between mb-3">
        <p class="font-headline font-bold text-sm">自选管理</p>
        <button id="closeFavManagerBtn" class="text-xs px-2.5 py-1.5 rounded-lg bg-gray-100 text-gray-600">关闭</button>
      </div>
      <div id="favGrid" class="grid grid-cols-2 gap-2"></div>
      <button id="saveFavBtn" class="w-full mt-3 rounded-xl bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5">保存自选</button>
    </section>

  </main>

  <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-gray-100 bottom-nav-safe z-50">
    <div class="w-full max-w-md mx-auto px-4 pb-4 pt-3">
      <div class="grid grid-cols-4 gap-2 mb-3">
        <a href="ai-chat.html" class="flex flex-col items-center gap-1 text-[11px] font-semibold text-gray-400">
          <span class="material-symbols-outlined text-[21px]">smart_toy</span>
          <span>agent</span>
        </a>
        <a href="Image 2.html" class="flex flex-col items-center gap-1 text-[11px] font-semibold text-gray-400">
          <span class="material-symbols-outlined text-[21px]">explore</span>
          <span>发现</span>
        </a>
        <a href="ai-watch.html" class="flex flex-col items-center gap-1 text-[11px] font-bold text-gray-900">
          <span class="material-symbols-outlined text-[21px]">notifications</span>
          <span>盯盘</span>
          <span class="h-0.5 w-7 rounded-full bg-gray-900"></span>
        </a>
        <a href="wallet.html" class="flex flex-col items-center gap-1 text-[11px] font-semibold text-gray-400">
          <span class="material-symbols-outlined text-[21px]">account_circle</span>
          <span>账户</span>
        </a>
      </div>
      <div class="flex items-center justify-between gap-3">
        <a href="news.html" class="w-12 h-12 flex-shrink-0 border border-[#8a6d00] rounded-full flex items-center justify-center bg-[#fff8d8] text-[10px] font-black text-[#8a6d00] shadow-sm">
          快讯
        </a>
        <div id="openAiAssistantInput" class="flex-grow h-12 bg-white rounded-full border border-gray-300 px-4 flex items-center cursor-pointer shadow-sm">
          <input id="aiAssistantInput" class="flex-grow text-sm border-none focus:ring-0 p-0 text-gray-700 bg-transparent placeholder:text-gray-400 cursor-pointer" placeholder="提问或搜索" type="text" readonly />
        </div>
        <a href="market.html" class="w-12 h-12 flex-shrink-0 border border-gray-300 rounded-full flex items-center justify-center bg-white text-[10px] font-black text-gray-500 shadow-sm">
          行情
        </a>
      </div>
      <p class="text-[9px] text-gray-400 mt-2 text-center">内容由AI生成，不构成投资建议</p>
    </div>
  </div>

  <script>
    const PAIRS = [
      "BTCUSDT", "ETHUSDT", "SOLUSDT", "BNBUSDT", "XRPUSDT",
      "DOGEUSDT", "ADAUSDT", "TRXUSDT", "LINKUSDT", "AVAXUSDT"
    ];

    const pairsListEl = document.getElementById("pairsList");
    const feedStatusEl = document.getElementById("feedStatus");
    const refreshBtnEl = document.getElementById("refreshBtn");
    const topTabs = Array.from(document.querySelectorAll("[data-market-tab]"));
    const typeTabs = Array.from(document.querySelectorAll("[data-type-tab]"));
    const viewTabs = Array.from(document.querySelectorAll("[data-view-tab]"));
    const openFavManagerBtnEl = document.getElementById("openFavManagerBtn");
    const favCountBadgeEl = document.getElementById("favCountBadge");
    const pairsHeaderEl = document.getElementById("pairsHeader");
    const favManagerPanelEl = document.getElementById("favManagerPanel");
    const closeFavManagerBtnEl = document.getElementById("closeFavManagerBtn");
    const favGridEl = document.getElementById("favGrid");
    const saveFavBtnEl = document.getElementById("saveFavBtn");
    const openAiAssistantInputEl = document.getElementById("openAiAssistantInput");
    const aiAssistantInputEl = document.getElementById("aiAssistantInput");
    const marketPanelEl = document.getElementById("marketPanel");
    const strategyPanelEl = document.getElementById("strategyPanel");
    const strategyListEl = document.getElementById("strategyList");
    const FAV_KEY = "zhidao_trade_favorites";
    let selectedMarket = "favorites";
    let selectedType = "spot";
    let selectedView = "market";
    let favorites = [];
    const AI_STRATEGIES = {
      long: [
        { title: "中期趋势加仓 - 做多", side: "做多", leverage: "7x", annualReturn: "+456.66%", maxAdds: "8", ratio: "1:0.94", tp: "1.40%" },
        { title: "短期进取抄底 - 做多", side: "做多", leverage: "8x", annualReturn: "+586.98%", maxAdds: "11", ratio: "1:0.62", tp: "1.70%" },
        { title: "长期稳健投资 - 做多", side: "做多", leverage: "5x", annualReturn: "+288.62%", maxAdds: "7", ratio: "1:1.10", tp: "1.50%" }
      ],
      short: [
        { title: "趋势反转狙击 - 做空", side: "做空", leverage: "6x", annualReturn: "+312.41%", maxAdds: "6", ratio: "1:0.88", tp: "1.30%" },
        { title: "波段回撤捕捉 - 做空", side: "做空", leverage: "7x", annualReturn: "+428.17%", maxAdds: "9", ratio: "1:0.70", tp: "1.60%" },
        { title: "稳健防守回撤 - 做空", side: "做空", leverage: "4x", annualReturn: "+236.55%", maxAdds: "5", ratio: "1:1.22", tp: "1.20%" }
      ]
    };
    let selectedStrategySide = "long";

    function fmtPrice(n) {
      const value = Number(n);
      if (!Number.isFinite(value)) return "--";
      if (value >= 1000) return value.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      if (value >= 1) return value.toLocaleString("en-US", { minimumFractionDigits: 4, maximumFractionDigits: 4 });
      return value.toLocaleString("en-US", { minimumFractionDigits: 6, maximumFractionDigits: 6 });
    }

    function fmtAmount(n) {
      const value = Number(n);
      if (!Number.isFinite(value)) return "--";
      if (value >= 1e8) return `${(value / 1e8).toFixed(2)}亿`;
      if (value >= 1e4) return `${(value / 1e4).toFixed(2)}万`;
      return value.toFixed(2);
    }

    function renderHeader() {
      const showFavCol = selectedMarket === "favorites";
      pairsHeaderEl.className = showFavCol
        ? "grid grid-cols-[1.2fr_1fr_0.7fr_0.45fr] text-[11px] text-gray-400 px-1 pb-2 border-b border-gray-100"
        : "grid grid-cols-[1.35fr_1fr_0.7fr] text-[11px] text-gray-400 px-1 pb-2 border-b border-gray-100";
      pairsHeaderEl.innerHTML = showFavCol
        ? `<span>名称/成交额</span><span class="text-right">价格</span><span class="text-right">24h涨跌</span><span class="text-right">自选</span>`
        : `<span>名称/成交额</span><span class="text-right">价格</span><span class="text-right">24h涨跌</span>`;
    }

    function renderRows(items) {
      pairsListEl.innerHTML = "";
      const showFavCol = selectedMarket === "favorites";
      items.forEach((item) => {
        const symbol = item.symbol;
        const base = symbol.replace("USDT", "");
        const pct = Number(item.priceChangePercent);
        const positive = Number.isFinite(pct) ? pct >= 0 : false;
        const isFav = favorites.includes(symbol);
        const row = document.createElement("a");
        row.href = `trade-detail.html?symbol=${encodeURIComponent(symbol)}`;
        row.className = showFavCol
          ? "grid grid-cols-[1.2fr_1fr_0.7fr_0.45fr] items-center py-3 hover:bg-gray-50 rounded-xl px-1"
          : "grid grid-cols-[1.35fr_1fr_0.7fr] items-center py-3 hover:bg-gray-50 rounded-xl px-1";
        row.innerHTML = `
          <div>
            <p class="font-bold">${base} <span class="text-gray-400 text-xs">/USDT</span></p>
            <p class="text-xs text-gray-400">$${fmtAmount(item.quoteVolume)}</p>
          </div>
          <div class="text-right">
            <p class="font-bold">${fmtPrice(item.lastPrice)}</p>
            <p class="text-xs text-gray-400">$${fmtPrice(item.weightedAvgPrice)}</p>
          </div>
          <div class="text-right">
            <span class="inline-flex px-2 py-1 text-xs rounded-lg ${positive ? "bg-emerald-500" : "bg-red-500"} text-white font-semibold">
              ${Number.isFinite(pct) ? `${positive ? "+" : ""}${pct.toFixed(2)}%` : "--"}
            </span>
          </div>
          ${showFavCol ? `
            <div class="text-right">
              <button class="fav-toggle-btn inline-flex items-center justify-center w-7 h-7 rounded-md ${isFav ? "bg-amber-500 text-white" : "bg-gray-100 text-gray-400"}" data-symbol="${symbol}">
                <span class="material-symbols-outlined text-[16px]">${isFav ? "check" : "add"}</span>
              </button>
            </div>
          ` : ""}
        `;
        const favBtn = showFavCol ? row.querySelector(".fav-toggle-btn") : null;
        if (showFavCol && favBtn) {
          favBtn.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            const s = favBtn.dataset.symbol;
            if (!s) return;
            if (favorites.includes(s)) {
              favorites = favorites.filter((x) => x !== s);
            } else {
              favorites.push(s);
            }
            saveFavorites();
            renderFavGrid();
            updateTabStyles();
            loadBinanceTickers();
          });
        }
        pairsListEl.appendChild(row);
      });
      if (!items.length) {
        pairsListEl.innerHTML = '<p class="text-sm text-gray-500 py-8 text-center">当前分组暂无交易对</p>';
      }
    }

    function loadFavorites() {
      try {
        const raw = localStorage.getItem(FAV_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        favorites = Array.isArray(parsed) ? parsed.filter((s) => typeof s === "string") : [];
      } catch (_) {
        favorites = [];
      }
      if (!favorites.length) {
        favorites = ["BTCUSDT", "ETHUSDT", "SOLUSDT", "BNBUSDT", "XRPUSDT"];
      }
    }

    function saveFavorites() {
      localStorage.setItem(FAV_KEY, JSON.stringify(favorites));
    }

    function renderFavGrid() {
      favGridEl.innerHTML = "";
      PAIRS.forEach((symbol) => {
        const checked = favorites.includes(symbol);
        const item = document.createElement("button");
        item.type = "button";
        item.className = `flex items-center justify-between rounded-xl border px-3 py-2 text-sm ${checked ? "border-amber-400 bg-amber-50 text-gray-900" : "border-gray-200 bg-gray-50 text-gray-700"}`;
        item.innerHTML = `
          <span>${symbol.replace("USDT", " / USDT")}</span>
          <span class="material-symbols-outlined text-[18px] ${checked ? "text-amber-500" : "text-gray-400"}">${checked ? "check_box" : "check_box_outline_blank"}</span>
        `;
        item.addEventListener("click", () => {
          if (favorites.includes(symbol)) {
            favorites = favorites.filter((s) => s !== symbol);
          } else {
            favorites.push(symbol);
          }
          renderFavGrid();
        });
        favGridEl.appendChild(item);
      });
    }

    function getSymbolsByTab() {
      if (selectedMarket === "favorites") return favorites;
      return PAIRS;
    }

    function renderStrategyList() {
      if (!strategyListEl) return;
      strategyListEl.className = "space-y-4 bg-black rounded-2xl p-4";
      const rows = (AI_STRATEGIES[selectedStrategySide] || []).map((item) => `
        <article class="rounded-2xl bg-[#1a1b1f] px-4 py-5 text-white">
          <h3 class="text-[24px] font-headline font-extrabold leading-tight">${item.title}</h3>
          <div class="mt-3 flex items-center gap-2">
            <span class="rounded-lg bg-[#2f4d00] text-[#b8ff39] px-2.5 py-1 text-[14px]">${item.side}</span>
            <span class="rounded-lg bg-[#2f4d00] text-[#b8ff39] px-2.5 py-1 text-[14px]">${item.leverage}</span>
          </div>
          <div class="mt-4 h-px bg-[#34363d]"></div>
          <div class="mt-4 grid grid-cols-2 gap-4">
            <div>
              <p class="text-[18px] text-[#8f949d]">回测年化收益率</p>
              <p class="mt-1 text-[56px] font-headline font-extrabold leading-none text-[#b8ff39]">${item.annualReturn}</p>
              <p class="mt-4 text-[18px] text-[#8f949d]">最大加仓次数</p>
              <p class="mt-1 text-[44px] leading-none">${item.maxAdds}</p>
              <p class="mt-5 text-[16px] text-[#e6e8eb]">◈ 欧易</p>
            </div>
            <div class="flex flex-col items-end">
              <p class="text-[18px] text-[#8f949d] border-b border-dashed border-[#69707c] pb-1">初始加仓比例</p>
              <p class="mt-1 text-[44px] leading-none">${item.ratio}</p>
              <p class="mt-5 text-[18px] text-[#8f949d] border-b border-dashed border-[#69707c] pb-1">单周期止盈目标</p>
              <p class="mt-1 text-[44px] leading-none">${item.tp}</p>
              <button class="useStrategyBtn mt-auto w-[140px] h-[56px] rounded-full bg-[#46484d] text-[24px] font-bold">使用</button>
            </div>
          </div>
        </article>
      `).join("");

      strategyListEl.innerHTML = `
        <div class="flex items-center gap-3">
          <button class="strategy-side-btn ${selectedStrategySide === "long" ? "bg-[#2f4d00] text-[#b8ff39] border-[#2f4d00]" : "bg-black text-[#a5a8ae] border-[#4a4d53]"} border rounded-full px-8 py-2 text-[18px]">做多</button>
          <button class="strategy-side-btn ${selectedStrategySide === "short" ? "bg-[#2f4d00] text-[#b8ff39] border-[#2f4d00]" : "bg-black text-[#a5a8ae] border-[#4a4d53]"} border rounded-full px-8 py-2 text-[18px]">做空</button>
        </div>
        ${rows}
      `;

      const sideBtns = strategyListEl.querySelectorAll(".strategy-side-btn");
      if (sideBtns[0]) {
        sideBtns[0].addEventListener("click", () => {
          selectedStrategySide = "long";
          renderStrategyList();
        });
      }
      if (sideBtns[1]) {
        sideBtns[1].addEventListener("click", () => {
          selectedStrategySide = "short";
          renderStrategyList();
        });
      }
      strategyListEl.querySelectorAll(".useStrategyBtn").forEach((btn) => {
        btn.addEventListener("click", () => {
          window.location.href = "ai-chat.html";
        });
      });
    }

    function updateTabStyles() {
      topTabs.forEach((btn) => btn.classList.toggle("active", btn.dataset.marketTab === selectedMarket));
      typeTabs.forEach((btn) => btn.classList.toggle("active", btn.dataset.typeTab === selectedType));
      viewTabs.forEach((btn) => btn.classList.toggle("active", btn.dataset.viewTab === selectedView));
      if (marketPanelEl) marketPanelEl.classList.toggle("hidden", selectedView !== "market");
      if (strategyPanelEl) strategyPanelEl.classList.toggle("hidden", selectedView !== "strategy");
      if (refreshBtnEl) refreshBtnEl.classList.toggle("hidden", selectedView !== "market");
      if (openFavManagerBtnEl) {
        openFavManagerBtnEl.classList.toggle("hidden", selectedView !== "market" || selectedMarket !== "favorites");
      }
      if (favCountBadgeEl) {
        favCountBadgeEl.textContent = `(${favorites.length})`;
      }
      if (selectedView === "market") {
        renderHeader();
      } else {
        renderStrategyList();
      }
    }

    async function loadBinanceTickers() {
      if (selectedView !== "market") return;
      feedStatusEl.textContent = "正在同步 Binance 行情...";
      try {
        const resp = await fetch("https://api.binance.com/api/v3/ticker/24hr", { cache: "no-store" });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const all = await resp.json();
        const map = new Map(all.map((x) => [x.symbol, x]));
        const symbols = getSymbolsByTab();
        const rows = symbols.map((s) => map.get(s)).filter(Boolean);
        renderRows(rows);
        const marketLabelMap = { favorites: "自选", binance: "币安", okx: "欧易", hyperliquid: "Hyperliquid" };
        const typeLabelMap = { spot: "现货", futures: "合约" };
        feedStatusEl.textContent = `已更新 ${rows.length} 个交易对 · ${marketLabelMap[selectedMarket]} · ${typeLabelMap[selectedType]} · ${new Date().toLocaleTimeString()}`;
      } catch (err) {
        console.error(err);
        feedStatusEl.textContent = `加载失败：${err.message || "网络错误"}`;
      }
    }

    topTabs.forEach((btn) => {
      btn.addEventListener("click", () => {
        selectedMarket = btn.dataset.marketTab;
        updateTabStyles();
        loadBinanceTickers();
      });
    });
    typeTabs.forEach((btn) => {
      btn.addEventListener("click", () => {
        selectedType = btn.dataset.typeTab;
        updateTabStyles();
        loadBinanceTickers();
      });
    });
    viewTabs.forEach((btn) => {
      btn.addEventListener("click", () => {
        selectedView = btn.dataset.viewTab;
        updateTabStyles();
        if (selectedView === "market") {
          loadBinanceTickers();
        }
      });
    });
    if (openFavManagerBtnEl) {
      openFavManagerBtnEl.addEventListener("click", () => {
        favManagerPanelEl.classList.toggle("hidden");
      });
    }
    if (closeFavManagerBtnEl) {
      closeFavManagerBtnEl.addEventListener("click", () => {
        favManagerPanelEl.classList.add("hidden");
      });
    }
    if (saveFavBtnEl) {
      saveFavBtnEl.addEventListener("click", () => {
        saveFavorites();
        favManagerPanelEl.classList.add("hidden");
        loadBinanceTickers();
      });
    }
    if (refreshBtnEl) refreshBtnEl.addEventListener("click", loadBinanceTickers);
    if (openAiAssistantInputEl) {
      openAiAssistantInputEl.addEventListener("click", () => {
        if (window.openInlineAssistantComposer) window.openInlineAssistantComposer();
      });
    }
    if (aiAssistantInputEl) {
      aiAssistantInputEl.addEventListener("focus", () => {
        aiAssistantInputEl.blur();
        if (window.openInlineAssistantComposer) window.openInlineAssistantComposer();
      });
    }
    loadFavorites();
    renderFavGrid();
    updateTabStyles();
    loadBinanceTickers();
    setInterval(loadBinanceTickers, 12000);
  </script>
  <script src="inline-assistant-composer.js"></script>
  <script src="auth-modal.js"></script>
</body>
</html>
